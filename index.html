<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>比特谷物语 · Bit Valley Story</title>
<style>
  /* ============================================================
     样式区 (基础皮肤; theme.css 在其后覆盖为 CRT 皮肤)
     ============================================================ */
  html,body{margin:0;height:100%;background:#05070a;overflow:hidden;font-family:"Courier New",monospace}
  #wrap{position:relative;width:100vw;height:100vh}
  #game{display:block;image-rendering:pixelated;background:#05070a}
  #hud{position:absolute;top:12px;left:12px;z-index:8;background:rgba(5,10,8,.82);border:1px solid #2f6f2f;
    border-radius:6px;padding:8px 12px;color:#7CFC00;font-size:12px;line-height:1.6;max-width:280px;
    transition:opacity .25s}
  #hud:hover{opacity:.15}          /* peek through: 悬停透视地图 */
  #hud b{font-size:15px}
  #goalStrip{margin-top:4px;font-size:12px;color:#8fd8a8}
  #goalStrip .gbar{display:inline-block;width:90px;height:6px;border:1px solid #2f6f2f;vertical-align:middle;margin:0 4px;background:rgba(0,0,0,.4)}
  #goalStrip .gfill{height:100%;background:#5fd8a0;display:block}
  #prompt{position:absolute;left:50%;bottom:34px;transform:translateX(-50%);z-index:8;color:#0a0f0a;
    background:#7CFC00;padding:6px 14px;font-size:14px;border-radius:2px;display:none;box-shadow:0 0 12px #2b6}
  #tip{position:absolute;left:12px;bottom:10px;color:#4f7a4f;font-size:12px;z-index:8}
  #coord{position:absolute;left:12px;bottom:32px;z-index:8;color:#7CFC00;font-size:12px;
    background:rgba(5,10,8,.72);padding:2px 8px;border-radius:3px}
  #toast{position:absolute;left:50%;top:64px;transform:translateX(-50%);z-index:35;background:rgba(10,25,10,.95);
    color:#ffce3a;border:1px solid #c9a24a;padding:8px 16px;font-size:13px;border-radius:3px;display:none;max-width:70vw;text-align:center}
  #errbox{position:absolute;left:8px;top:8px;right:8px;z-index:99;background:rgba(60,0,0,.92);color:#ffb0b0;
    border:1px solid #a33;padding:8px 12px;font-size:12px;display:none;white-space:pre-wrap;max-height:40vh;overflow:auto}

  /* --- REF 条 / HUD 附件 --- */
  #refBar{display:inline-block;width:110px;height:8px;border:1px solid #2f6f2f;vertical-align:middle;margin:0 6px;background:rgba(0,0,0,.4)}
  #refFill{height:100%;background:#7CFC00;transition:width .4s}
  #refFill.warn{background:#ffce3a}
  #refFill.low{background:#ff5e5e}
  #hudLang{margin-top:5px;font-size:10px;padding:1px 8px;cursor:pointer}
  @keyframes hudflash{0%{background:rgba(255,206,58,.55)}100%{background:transparent}}
  #hudObj.flash{animation:hudflash 1.2s ease-out}

  /* --- 通用面板 --- */
  .panel{position:absolute;z-index:22;background:rgba(4,9,6,.97);border:1px solid #2f6f2f;border-radius:6px;
    color:#bfeebf;font-size:13px;line-height:1.65;display:none;box-shadow:0 0 30px rgba(40,120,60,.28)}
  .panel h3{margin:0 0 8px;color:#9fee9f;letter-spacing:2px;font-size:14px;border-bottom:1px solid #1f3f1f;padding-bottom:5px}
  .btn{background:#0a1f0a;color:#7CFC00;border:1px solid #2f6f2f;padding:5px 14px;font-family:inherit;
    font-size:13px;cursor:pointer;letter-spacing:1px;border-radius:2px}
  .btn:hover{background:#123312;box-shadow:0 0 10px #2b6}
  .btn.warn{color:#ffce3a;border-color:#c9a24a}
  .k{color:#ffce3a}
  .dim{color:#4a7a4a}

  /* --- 任务日志 (J) --- */
  #journal{top:12px;right:12px;bottom:52px;width:310px;padding:12px 14px;overflow-y:auto}
  #journal .sec{margin:10px 0 3px;color:#5a8a5a;font-size:11px;letter-spacing:2px;border-bottom:1px dashed #1f3f1f}
  #journal .q{margin:4px 0;padding-left:15px;position:relative;color:#bfeebf;font-size:12px}
  #journal .q::before{content:"○";position:absolute;left:0;color:#3a6a3a}
  #journal .q.done{color:#527a52;text-decoration:line-through}
  #journal .q.done::before{content:"●";color:#7CFC00}
  #journal .q.hid{color:#c9a24a}
  #journal .q.hid::before{content:"◈";color:#c9a24a}
  #journal .st{margin:1px 0 1px 22px;font-size:12px;color:#7aa87a;position:relative;padding-left:12px}
  #journal .st::before{content:"·";position:absolute;left:0}
  #journal .st.done{color:#48704f;text-decoration:line-through}
  #journal .st.done::before{content:"✓";color:#7CFC00}
  .jtabs{display:flex;gap:6px;margin:4px 0 8px}
  .jtab{flex:1;text-align:center;padding:3px 0;border:1px solid #1f3f1f;cursor:pointer;font-size:12px;color:#5a8a5a;letter-spacing:1px}
  .jtab.cur{color:#7CFC00;border-color:#2f6f2f;background:rgba(20,50,20,.4)}
  #journal .clue{margin:6px 0;padding:6px 8px;background:rgba(30,25,5,.5);border-left:2px solid #c9a24a;font-size:12px}
  #journal .clue b{color:#ffce3a}
  #journal .clue code{color:#ffce3a;font-size:14px}

  /* --- 手册 (M): 居中态 + 侧挂态 --- */
  #manual{left:50%;top:50%;transform:translate(-50%,-50%);width:min(700px,94vw);height:min(540px,90vh);
    display:none;flex-direction:column;z-index:26}
  #manual.on{display:flex}
  #manual.side{left:auto;right:10px;top:10px;bottom:10px;transform:none;width:min(470px,40vw);height:auto}
  /* 手册侧挂时, 谜题类面板自动让位到左侧 */
  body.man-side #modP{left:8px;top:50%;transform:translate(0,-50%);width:min(640px,56vw)}
  body.man-side #asmP{left:8px;top:50%;transform:translate(0,-50%);width:min(840px,57vw)}
  body.man-side #binP{left:8px;top:50%;transform:translate(0,-50%)}
  #mhead{padding:10px 16px;border-bottom:1px solid #2f6f2f;color:#9fee9f;letter-spacing:2px;display:flex;justify-content:space-between;align-items:center}
  #mbody{flex:1;overflow-y:auto;padding:14px 22px}
  #mbody pre{background:rgba(10,25,10,.5);border:1px solid #1f3f1f;padding:8px 12px;color:#9fee9f;
    font-size:12px;line-height:1.5;overflow-x:auto;margin:8px 0}
  #mbody .warnbox{border:1px solid #c9a24a;color:#ffce3a;padding:6px 10px;margin:10px 0;font-size:12px;background:rgba(40,30,5,.4)}
  #mbody h4{color:#7CFC00;margin:12px 0 4px;letter-spacing:1px}
  #mbody table{border-collapse:collapse;font-size:12px;margin:8px 0}
  #mbody td,#mbody th{border:1px solid #1f3f1f;padding:3px 10px;color:#bfeebf;text-align:left}
  #mbody th{color:#9fee9f;background:rgba(20,40,20,.4)}
  #mfoot{padding:8px 16px;border-top:1px solid #2f6f2f;display:flex;justify-content:space-between;align-items:center}
  .dexRow{margin:4px 0;padding:4px 8px;border:1px solid #14281a;font-size:12px}
  .dexRow.got{border-color:#2f6f2f;color:#bfeebf}
  .dexRow.no{color:#3a5a3a}
  .dexRow .k{float:right}

  /* --- 二进制门 --- */
  #binP{left:50%;top:50%;transform:translate(-50%,-50%);width:min(440px,92vw);padding:18px 24px;text-align:center}
  .bitrow{display:flex;justify-content:center;gap:12px;margin:14px 0 6px}
  .bit{width:58px;height:58px;font-size:26px;font-family:inherit;cursor:pointer;border:2px solid #2f6f2f;
    background:#0a1408;color:#3a6a3a;border-radius:4px}
  .bit.on{background:#123f12;color:#7CFC00;border-color:#7CFC00;box-shadow:0 0 14px #2b6}
  .bw{display:flex;justify-content:center;gap:12px;color:#5a8a5a;font-size:11px}
  .bw span{width:58px}
  #binVal{font-size:22px;color:#ffce3a;margin:10px 0}

  /* --- 汇编终端 --- */
  #asmP{left:50%;top:50%;transform:translate(-50%,-50%);width:min(880px,96vw);height:min(580px,94vh);
    display:none;flex-direction:column;padding:0}
  #asmP.on{display:flex}
  #asmHead{padding:9px 16px;border-bottom:1px solid #2f6f2f;color:#9fee9f;letter-spacing:2px;display:flex;justify-content:space-between}
  #asmMain{flex:1;display:flex;gap:10px;padding:10px 14px;min-height:0}
  #asmSrc{flex:1.15;background:#060d06;color:#aef0ae;border:1px solid #1f3f1f;font-family:inherit;font-size:13px;
    line-height:1.5;padding:8px 10px;resize:none;outline:none;white-space:pre;overflow:auto}
  #asmSide{flex:1;display:flex;flex-direction:column;gap:8px;min-width:0;overflow-y:auto}
  .asmBox{border:1px solid #1f3f1f;background:rgba(10,20,10,.45);padding:6px 10px;font-size:12px}
  .asmBox b{color:#9fee9f;letter-spacing:1px;font-size:11px}
  #asmRegs span{display:inline-block;margin-right:14px;color:#ffce3a;font-size:14px}
  #memGrid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;margin-top:4px}
  #memGrid div{border:1px solid #142814;padding:2px 3px;font-size:10px;color:#7aa87a;text-align:center}
  #memGrid div.hot{color:#ffce3a;border-color:#c9a24a}
  #asmOut{min-height:44px;color:#7CFC00;font-size:14px;white-space:pre-wrap}
  #asmStatus{color:#5a8a5a;font-size:11.5px;min-height:16px}
  #asmStatus.err{color:#ff8080}
  #asmStatus.win{color:#7CFC00;font-size:13px}
  #asmFoot{padding:8px 14px;border-top:1px solid #2f6f2f;display:flex;gap:8px;align-items:center}

  /* --- 通用模态 --- */
  #modalP{left:50%;top:50%;transform:translate(-50%,-50%);width:min(540px,92vw);padding:20px 26px;text-align:center}
  #modalP h3{text-align:center}
  #modalP p{text-align:left;color:#9fee9f}

  /* --- 对话框 --- */
  #dlgP{left:50%;bottom:20px;transform:translateX(-50%);width:min(660px,94vw);padding:12px 18px 10px}
  #dlgName{color:#ffce3a;letter-spacing:2px;font-size:13px;margin-bottom:4px}
  #dlgText{color:#cfeecf;font-size:14px;min-height:44px;line-height:1.7}
  #dlgHint{color:#3f6a3f;font-size:11px;text-align:right}
  #dlgChoices{margin-top:8px;display:flex;flex-direction:column;gap:5px}
  #dlgChoices button{text-align:left}

  /* --- 开场: 机器花园 · 清晨冷调天光(明亮但不低幼) --- */
  .overlay{position:absolute;inset:0;color:#cdd6e0;display:flex;
    background:linear-gradient(180deg,#16283e 0%,#24486a 30%,#3f7fa0 58%,#8fc6d4 82%,#c8e6e0 100%);
    align-items:center;justify-content:center;flex-direction:column;text-align:center;z-index:40;padding:24px}
  .overlay h1{font-size:38px;letter-spacing:6px;color:#f2f7fa;margin:.2em;position:relative;
    text-shadow:0 0 24px rgba(63,212,196,.55),0 2px 8px rgba(4,10,18,.65)}
  .overlay p{max-width:580px;line-height:1.9;color:#cdd6e0;position:relative}
  .overlay button{margin-top:14px;background:rgba(14,20,30,.82);color:#d8b36a;border:1px solid rgba(216,179,106,.55);
    padding:10px 26px;font-family:inherit;font-size:15px;cursor:pointer;letter-spacing:2px;
    border-radius:8px;position:relative}
  .overlay button:hover{background:#d8b36a;color:#10151d;box-shadow:0 6px 22px rgba(216,179,106,.4)}
  #introLang{position:absolute;top:16px;right:18px;z-index:2}
  #introLang button{margin:0 4px;padding:4px 12px;font-size:12px}
  #introBtns{position:relative}
  #introArt{position:absolute;left:0;right:0;bottom:0;width:100%;height:42vh;
    pointer-events:none;display:block}
  #introSun{position:absolute;top:7vh;left:14vw;width:140px;height:140px;border-radius:50%;
    pointer-events:none;background:radial-gradient(circle,rgba(235,250,252,.9) 0%,rgba(150,225,230,.4) 42%,rgba(150,225,230,0) 70%)}

  /* --- 模块谜题面板 --- */
  #modP{left:50%;top:50%;transform:translate(-50%,-50%);width:min(720px,95vw);max-height:min(660px,94vh);
    display:none;flex-direction:column;padding:0}
  #modP.on{display:flex}
  #modHead{padding:9px 16px;border-bottom:1px solid #2f6f2f;color:#9fee9f;letter-spacing:2px;display:flex;justify-content:space-between}
  #modBody{flex:1;overflow-y:auto;padding:12px 16px;min-height:0}

  /* --- 小地图 (Tab) --- */
  #mapP{left:50%;top:50%;transform:translate(-50%,-50%);padding:12px 16px;text-align:center;z-index:24}
  #mapCv{display:block;background:#04060a;border:1px solid #1f3f1f;margin:6px auto}
  #mapLegend{font-size:11px;margin-top:6px;color:#5a8a5a;text-align:left;max-width:560px}

  /* --- 进出建筑淡入淡出 --- */
  #fadeOv{position:absolute;inset:0;background:#02040a;opacity:0;transition:opacity .15s;
    pointer-events:none;z-index:50;display:flex;align-items:center;justify-content:center}
  #fadeOv span{color:#3fd4c4;font-size:12px;letter-spacing:3px;opacity:.7}

  /* --- Esc 暂停菜单 --- */
  #pauseP{left:50%;top:50%;transform:translate(-50%,-50%);width:min(420px,92vw);padding:18px 24px}
  #pauseP h3{text-align:center}
  #pauseP .row{display:flex;align-items:center;gap:10px;margin:9px 0;font-size:12.5px}
  #pauseP .row label{width:88px;color:#9fee9f}
  #pauseP input[type=range]{flex:1}
  #pauseP textarea{width:100%;height:64px;background:#060d06;color:#aef0ae;border:1px solid #1f3f1f;
    font-family:inherit;font-size:11px;resize:none;box-sizing:border-box}

  /* --- primer 概念卡 / codex --- */
  .primerCard{border:1px solid #c9a24a;background:rgba(40,32,8,.45);padding:12px 16px;margin:4px 0 10px}
  .primerCard h4{color:#ffce3a;margin:0 0 6px;letter-spacing:1px}
  .primerCard .pbody{font-size:12.5px;line-height:1.7;color:#e8dcc0}
  .primerCard .pex{margin-top:8px;padding:6px 10px;border-left:2px solid #c9a24a;font-size:12px;color:#cdbf9a}
  .cdxRow{margin:6px 0;border:1px solid #14281a;padding:0}
  .cdxRow summary{cursor:pointer;padding:6px 10px;color:#9fee9f;font-size:12.5px;list-style:none}
  .cdxRow summary::before{content:"📖 "}
  .cdxRow[open]{border-color:#2f6f2f}
  .cdxRow .cbody{padding:2px 12px 10px;font-size:12px;line-height:1.7;color:#bfeebf}
  .cdxRow .cex{margin-top:6px;padding:5px 9px;border-left:2px solid #2f6f2f;color:#8fbb8f;font-size:11.5px}
  .cdxSyl{color:#5a8a5a;font-size:10.5px;letter-spacing:1px}
  #modHead .hbtn{background:none;border:1px solid #2f6f2f;color:#9fee9f;font-family:inherit;
    font-size:12px;cursor:pointer;padding:2px 8px;margin-left:8px;border-radius:2px}
  #modHead .hbtn:hover{background:#123312}
  .jfb{cursor:pointer;font-size:11px;opacity:.75}
  .jfb:hover{opacity:1}
  #jRecent{margin:2px 0 8px;font-size:12px;border:1px dashed #1f3f1f;padding:0}
  #jRecent summary{cursor:pointer;color:#5a8a5a;padding:3px 8px;list-style:none;letter-spacing:1px}
  #jRecent .rev{padding:1px 10px 3px;color:#7aa87a}

  /* --- 飞升过场 --- */
  #ascendOv{position:absolute;inset:0;background:#020204;z-index:60;display:none;
    align-items:center;justify-content:center;flex-direction:column;text-align:center;opacity:1;transition:opacity 1s}
  #ascendOv div{font-size:22px;letter-spacing:3px;color:#b48aff;text-shadow:0 0 18px #7040c0;
    margin:14px;opacity:0;transition:opacity 1.4s;font-family:"Courier New",monospace}
</style>
<link rel="stylesheet" href="theme.css">
<style>
  /* ============================================================
     全局阅读舒适度 (加载在 theme.css 之后, 语言相关覆盖)
     原则: 等宽只留给代码域; 中文正文走黑体/≥14px/行高≥1.7/零字距;
     EN 模式保留紧凑终端风(那是它的味道); 标题装饰性字距不受影响
     ============================================================ */
  body.lang-zh{--font-body:'PingFang SC','Microsoft YaHei','Noto Sans SC','Source Han Sans SC',sans-serif}
  body.lang-zh #dlgText{font-family:var(--font-body);font-size:16px;line-height:1.85;letter-spacing:0}
  body.lang-zh #dlgChoices button{font-family:var(--font-body);font-size:14px;letter-spacing:0;line-height:1.6}
  body.lang-zh #modalP p,body.lang-zh #modalB{font-family:var(--font-body);font-size:14.5px;line-height:1.8;letter-spacing:0}
  body.lang-zh #modBody{font-family:var(--font-body);font-size:14px;line-height:1.75;letter-spacing:0}
  body.lang-zh #mbody{font-family:var(--font-body);font-size:14px;line-height:1.78;letter-spacing:0}
  body.lang-zh .primerCard .pbody{font-size:14.5px;line-height:1.85}
  body.lang-zh .primerCard .pex{font-size:13.5px;line-height:1.75}
  body.lang-zh .cdxRow .cbody{font-size:14px;line-height:1.85}
  body.lang-zh .cdxRow summary{font-size:13.5px;letter-spacing:0}
  body.lang-zh #journal .q{font-size:13px;line-height:1.7;letter-spacing:0}
  body.lang-zh #journal .st{font-size:12.5px;line-height:1.65}
  body.lang-zh #journal .clue{font-size:12.5px;line-height:1.7}
  body.lang-zh #jRecent .rev{line-height:1.65}
  body.lang-zh #hud{font-size:12.5px;letter-spacing:0}
  body.lang-zh #tip{font-size:12.5px;letter-spacing:0}
  body.lang-zh #prompt{font-size:14.5px}
  body.lang-zh #toast{font-size:14px;line-height:1.7;letter-spacing:0}
  body.lang-zh .overlay p{font-size:15px;line-height:2;letter-spacing:0}
  body.lang-zh #pauseP .row{font-size:13.5px;letter-spacing:0}
  /* 代码域: 等宽是功能, 中文模式也不动 */
  body.lang-zh #mbody pre,body.lang-zh #mbody table,body.lang-zh code,body.lang-zh pre,
  body.lang-zh #asmSrc,body.lang-zh #memGrid,body.lang-zh #asmRegs,body.lang-zh .bit,
  body.lang-zh #binVal,body.lang-zh textarea,body.lang-zh input{font-family:'Cascadia Code','Consolas','Courier New',monospace}
</style>
</head>
<body><div id="wrap">
  <canvas id="game"></canvas>
  <div id="hud"></div>
  <div id="prompt"></div>
  <div id="toast"></div>
  <div id="coord"></div>
  <div id="tip"></div>
  <div id="errbox"></div>

  <!-- 任务日志 -->
  <div class="panel" id="journal"></div>

  <!-- 维护手册 -->
  <div class="panel" id="manual">
    <div id="mhead"><span id="mtitle">BIT-9618 维护手册</span><span id="mpage" class="dim"></span></div>
    <div id="mbody"></div>
    <div id="mfoot">
      <button class="btn" id="mprev">&lt;</button>
      <span class="dim" id="mfhint">← → 翻页 · M / Esc 合上</span>
      <button class="btn" id="mnext">&gt;</button>
    </div>
  </div>

  <!-- 二进制门控 -->
  <div class="panel" id="binP">
    <h3 id="binTitle">GATE-04</h3>
    <p style="text-align:left" id="binDesc"></p>
    <div class="bw"><span>8</span><span>4</span><span>2</span><span>1</span></div>
    <div class="bitrow" id="bits"></div>
    <div id="binVal"></div>
    <div style="margin-top:8px"><button class="btn" id="binClose">Esc</button></div>
  </div>

  <!-- 汇编终端 -->
  <div class="panel" id="asmP">
    <div id="asmHead"><span id="asmTitle">CPU-9618</span><span class="dim" id="asmGoal"></span></div>
    <div id="asmMain">
      <textarea id="asmSrc" spellcheck="false"></textarea>
      <div id="asmSide">
        <div class="asmBox" id="asmRegs"></div>
        <div class="asmBox"><b id="memLabel">MEM [0..31]</b><div id="memGrid"></div></div>
        <div class="asmBox"><b>OUT</b><div id="asmOut"></div></div>
        <div class="asmBox"><b id="stLabel">STATUS</b><div id="asmStatus"></div></div>
      </div>
    </div>
    <div id="asmFoot">
      <button class="btn" id="asmLoad">LOAD ⟲</button>
      <button class="btn" id="asmStep">STEP ▸</button>
      <button class="btn" id="asmRun">RUN ▸▸</button>
      <button class="btn warn" id="asmMan">M</button>
      <span style="flex:1"></span>
      <button class="btn" id="asmClose">Esc</button>
    </div>
  </div>

  <!-- 通用模态 -->
  <div class="panel" id="modalP"><h3 id="modalT"></h3><p id="modalB"></p>
    <button class="btn" id="modalOk">[E]</button></div>

  <!-- 对话框 -->
  <div class="panel" id="dlgP">
    <div id="dlgName"></div>
    <div id="dlgText"></div>
    <div id="dlgChoices"></div>
    <div id="dlgHint">[E]</div>
  </div>

const TOASTQ=[];let toastBusy=false;
function toastDur(txt,long){
  const len=String(txt).replace(/<[^>]*>/g,'').length;
  return Math.min(8000,(long?3400:2500)+Math.ceil(len/15)*1000);
}
function recordEvent(txt){

}

};
const EXP={as:new Set(),a2:new Set()};
function save(){
  try{
    state.px=player.x; state.py=player.y;
    state.explored={as:[...EXP.as],a2:[...EXP.a2]};
    localStorage.setItem(SAVE_KEY,JSON.stringify(state));
  }catch(e){}
}
function hasSave(){try{return !!(localStorage.getItem(SAVE_KEY)||localStorage.getItem(OLD_KEY));}catch(e){return false;}}
function load(){
  try{
    let d=JSON.parse(localStorage.getItem(SAVE_KEY)||'null');
    if(!d){
      const o=JSON.parse(localStorage.getItem(OLD_KEY)||'null');
      if(!o)return false;
      d=migrateV3(o);
    }
    if(d.v==null||d.v<4)d=migrateV3(d);
    if(d.v<5)d=migrateV4to5(d);
    // 逐字段合并(缺省用默认)
    for(const k in state){if(d[k]!==undefined)state[k]=d[k];}
    state.v=5;
    EXP.as=new Set((state.explored&&state.explored.as)||[]);
    EXP.a2=new Set((state.explored&&state.explored.a2)||[]);
    if(state.interior&&!IMODS[state.interior]){ // 模块没加载成功: 弹回野外
      state.interior=null;
      if(state.retPos){state.world=state.retPos.world||'as';state.px=state.retPos.px;state.py=state.retPos.py;state.retPos=null;}
    }
    setContext();
    player.x=state.px; player.y=state.py;
    if(state.gate)openGateTiles();
    if(state.asm)openDoor2Tiles();
    return true;
  }catch(e){return false;}
}
function migrateV3(o){
  const d=Object.assign({},o);
  d.v=4;
  d.items=d.items||{};
  if((d.collected||[]).includes('幽灵密钥'))d.items.ghost_key=d.items.ghost_key||'幽灵密钥';
  d.mq=d.mq||{}; d.dex=d.dex||[]; d.ref=(d.ref==null)?100:d.ref;
  d.world=d.world||'as'; d.interior=null; d.retPos=null;
  d.ascended=!!d.ascended; d.a2Unlocked=!!d.a2Unlocked;
  d.explored=d.explored||{as:[],a2:[]}; d.playMs=d.playMs||0;
  return d;
}
function migrateV4to5(o){
  const d=Object.assign({},o);
  d.v=5;
  d.recentEvents=Array.isArray(d.recentEvents)?d.recentEvents:[];
  d.hudHidden=!!d.hudHidden;
  d.chapSeen=d.chapSeen|0;
  d.letters=Array.isArray(d.letters)?d.letters:[];
  return d;
}
function wipeSave(){try{localStorage.removeItem(SAVE_KEY);localStorage.removeItem(OLD_KEY);}catch(e){}}

/* ---------------- 3. 双世界地图 ----------------
   地形: 0草 1树 2山(阻) 3水(阻) 4路 5沙 6能量门(阻,可开)
   AS 90×64 主世界 · A2 64×48 深层世界 */
const ASW=90,ASH=64, A2W=64,A2H=48;
/* 初始峡谷(教学台地): S 形动线 出生→东→北(二进制门)→口袋区→北(神殿)→终门→高地揭幕 */
const CANYON={x0:36,y0:10,x1:70,y1:48};
const GATE=[{x:57,y:36},{x:58,y:36}];          // 二进制门(峡谷中段)
const DOOR2=[{x:53,y:16},{x:54,y:16}];         // 终门(汇编通关后开)
const SPAWN={x:42.5,y:43};
let MAPAS=[],MAPA2=[];
let curTiles=null,MW=ASW,MH=ASH,CT=TILE;

function carve(m,x0,y0,x1,y1,t){ // 直线段(水平/垂直), t 缺省=路4
  t=(t===undefined)?4:t;
  if(x0===x1){const a=Math.min(y0,y1),b=Math.max(y0,y1);
    for(let y=a;y<=b;y++){if(m[y]&&m[y][x0]!=null)m[y][x0]=t;}}
  else{const a=Math.min(x0,x1),b=Math.max(x0,x1);
    for(let x=a;x<=b;x++){if(m[y0]&&m[y0][x]!=null)m[y0][x]=t;}}
}
function room(m,x0,y0,x1,y1){for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++)if(m[y]&&m[y][x]!=null)m[y][x]=0;}
function clearAt(m,tx,ty,r,road){
  for(let y=ty-r;y<=ty+r;y++)for(let x=tx-r;x<=tx+r;x++)
    if(m[y]&&m[y][x]!=null&&m[y][x]!==6)m[y][x]=(road&&y===ty+1&&Math.abs(x-tx)<=r)?4:0;
}
function ridge(m,x0,x1,y,gap){
  for(let x=x0;x<=x1;x++){
    if(gap!=null&&Math.abs(x-gap)<=1)continue;
    if(m[y]&&m[y][x]!=null)m[y][x]=2;
    if(m[y+1]&&m[y+1][x]!=null&&rnd(x*3.3+y)>0.45)m[y+1][x]=2;
  }
}
/* --- AS 主图 ---
   峡谷区 = 线性教学(S 形+口袋); 开放区 = BotW 三角形法则
   (大=领域建筑地标 中=山脊/河挡视线 小=石碑/缓存节奏) */
function genAS(){
  const m=MAPAS;
  for(let y=0;y<ASH;y++){m[y]=[];for(let x=0;x<ASW;x++){
    let t=0;const r=rnd(x*13.1+y*7.7),r2=rnd(x*4.3+y*9.1);
    if(r<0.11)t=1; else if(r>0.965)t=2; else if(r2>0.975)t=5;
    m[y][x]=t;
  }}
  for(let x=0;x<ASW;x++){m[0][x]=2;m[ASH-1][x]=2;}
  for(let y=0;y<ASH;y++){m[y][0]=2;m[y][ASW-1]=2;}
  // 大河(中景屏障, 开放区)
  let ry=19;
  for(let x=4;x<ASW-4;x++){ry+=Math.round((rnd(x*2.7)-0.5)*2);ry=Math.max(8,Math.min(ASH-12,ry));
    m[ry][x]=3;m[ry+1][x]=3;}
  // 南部小河
  let sy2=52;
  for(let x=6;x<40;x++){sy2+=Math.round((rnd(x*5.1+9)-0.5)*2);sy2=Math.max(46,Math.min(58,sy2));m[sy2][x]=3;}
  // 开放区中景山脊(挡视线逼选路)
  ridge(m,10,26,30,18); ridge(m,74,88,24,80); ridge(m,8,30,44,22); ridge(m,74,88,48,78);
  // ---- 初始峡谷: 整块填山, 再雕出 S 形动线 ----
  for(let y=CANYON.y0;y<=CANYON.y1;y++)for(let x=CANYON.x0;x<=CANYON.x1;x++)m[y][x]=2;
  room(m,40,40,48,45);                 // 出生室
  room(m,48,42,59,44);                 // 走廊 A (东行)
  room(m,51,45,51,45);                 // 口袋A入口
  room(m,50,45,55,47);                 // 口袋A(教学: 离开主路有奖励)
  room(m,56,37,61,44);                 // 弯厅A(门控终端/刻痕墙/售货机)
  room(m,56,30,59,35);                 // 走廊 B (北行, 门后)
  room(m,44,28,59,32);                 // 弯厅B+口袋B(支线NPC)
  room(m,52,22,55,28);                 // 走廊 C (北行)
  room(m,46,17,62,22);                 // 神殿前庭(高台)
  room(m,52,13,55,16);                 // 终门走廊
  room(m,46,10,62,13);                 // 揭幕高地(出口)
  carve(m,42,43,58,43);                // 地面走线: 教学动线指路
  carve(m,57,31,57,42);
  carve(m,52,31,57,31);
  carve(m,53,22,53,30);
  carve(m,53,17,53,21);
  carve(m,53,13,53,16);
  GATE.forEach(g=>m[g.y][g.x]=6);
  DOOR2.forEach(g=>m[g.y][g.x]=6);
  // ---- 高地出口坡道 → 开放世界 ----
  carve(m,46,12,40,12); carve(m,40,12,36,12);
  // ---- 开放区电路干线(隐性道路) ----
  carve(m,36,12,26,12); carve(m,26,12,26,10);            // → logic 锻造厂(北西)
  carve(m,26,12,26,22); carve(m,26,22,12,22);            // → data 表示馆(西)
  carve(m,26,22,26,36); carve(m,26,36,30,36);            // → 废弃机房
  carve(m,26,36,26,50); carve(m,26,50,20,50);            // → memory 迷宫(西南)
  carve(m,62,12,72,12); carve(m,72,12,72,30);            // → 东干线
  carve(m,72,30,74,30);                                   // → 重启塔
  carve(m,72,34,74,34);                                   // → 传送门
  carve(m,72,34,72,42); carve(m,72,42,78,42);            // → algo 竞技场(东南)
  carve(m,72,12,84,12); carve(m,84,12,84,16);            // → 密码地窟
  carve(m,72,20,78,20);                                   // → 核心机房(第3章, 东侧)
  carve(m,72,42,72,52); carve(m,72,52,64,52);            // → 安全哨站(第4章, 南部)
  carve(m,26,26,30,26);                                   // → 缓存驿站(路口东侧)
  // ---- 接力门共修圃 (社交试点: 两人共同签署才开的门) ----
  for(let y=49;y<=56;y++)for(let x=77;x<=87;x++){if(m[y]&&m[y][x]!=null)m[y][x]=2;}
  room(m,79,51,85,55);                                    // 圃内
  carve(m,78,44,78,46); carve(m,78,46,81,46); carve(m,81,46,81,52); // 门前走廊
  // 各 POI 周围清空
  REALMS_AS.forEach(l=>clearAt(m,l.tx,l.ty,2,true));
  clearAt(m,TOWER.tx,TOWER.ty,3,true);
  clearAt(m,PORTALS.as.tx,PORTALS.as.ty,2);
  STELES_AS.forEach(st=>clearAt(m,st.tx,st.ty,1));
  NPCS_AS.forEach(n=>clearAt(m,n.tx,n.ty,1));
  CONSOLES_AS.forEach(c=>clearAt(m,c.tx,c.ty,1));
  HIDDENS_AS.forEach(h2=>clearAt(m,h2.tx,h2.ty,1));
  CACHES_AS.forEach(c=>clearAt(m,c.tx,c.ty,1));
  MAILBOXES.forEach(b=>clearAt(m,b.tx,b.ty,1));
  KDOORS.forEach(k=>clearAt(m,k.tx,k.ty,1));
  // 峡谷内清空只许在房间里发生过 → 重新钉门
  GATE.forEach(g=>{if(!state.gate)m[g.y][g.x]=6;});
  DOOR2.forEach(g=>{if(!state.asm)m[g.y][g.x]=6;});
  if(state.gate)GATE.forEach(g=>m[g.y][g.x]=4);
  if(state.asm)DOOR2.forEach(g=>m[g.y][g.x]=4);
  // 接力门: 已开(本机见过 open)→ 路; 否则锁
  RELAY_DOORS.forEach(d=>{m[d.ty][d.tx]=state.flags['relay_open_'+d.id]?4:6;});
}
function openRelayTiles(id){
  const d=RELAY_DOORS.find(x=>x.id===id);
  if(d&&MAPAS[d.ty])MAPAS[d.ty][d.tx]=4;
}
/* --- A2 深层世界 --- */
function genA2(){
  const m=MAPA2;
  for(let y=0;y<A2H;y++){m[y]=[];for(let x=0;x<A2W;x++){
    let t=0;const r=rnd(x*17.7+y*5.3+99),r2=rnd(x*7.9+y*11.3+7);
    if(r<0.09)t=1; else if(r>0.94)t=2; else if(r2>0.965)t=3;
    m[y][x]=t;
  }}
  for(let x=0;x<A2W;x++){m[0][x]=2;m[A2H-1][x]=2;}
  for(let y=0;y<A2H;y++){m[y][0]=2;m[y][A2W-1]=2;}
  for(let x=6;x<A2W-6;x++){const yy=28+Math.round(Math.sin(x*0.4)*2);if(x<28||x>38){m[yy][x]=3;if(x%2)m[yy+1][x]=3;}}
  carve(m,32,24,32,16); carve(m,32,16,16,16); carve(m,16,16,16,13);
  carve(m,32,24,32,34); carve(m,32,34,46,34);
  REALMS_A2.forEach(l=>clearAt(m,l.tx,l.ty,2,true));
  clearAt(m,PORTALS.a2.tx,PORTALS.a2.ty,2);
  STELES_A2.forEach(st=>clearAt(m,st.tx,st.ty,1));
  NPCS_A2.forEach(n=>clearAt(m,n.tx,n.ty,1));
  CACHES_A2.forEach(c=>clearAt(m,c.tx,c.ty,1));
}
function openGateTiles(){GATE.forEach(g=>{if(MAPAS[g.y])MAPAS[g.y][g.x]=4;});}
function openDoor2Tiles(){DOOR2.forEach(g=>{if(MAPAS[g.y])MAPAS[g.y][g.x]=4;});}

/* ---------------- 5. 输入状态机 ----------------
   mode: intro|play|dialog|modal|manual|bin|asm|mod|map|lb|inv|pause|ascend
   键位规范: Esc = 万能返回/关闭(所有面板无一例外; 输入框聚焦时先失焦);
             E   = 交互/继续/确认, 只在无输入框的只读弹窗(石碑/对话/模态)兼作关闭
   手册可"侧挂"在 bin/asm/mod/modal 之上(manReturn 记录下层模式, 关手册回下层) */
let mode='intro';
const keys={};
function clearKeys(){for(const k in keys)keys[k]=false;}
function setMode(m){mode=m;clearKeys();}
addEventListener('keydown',e=>{
  const tag=e.target&&e.target.tagName;
  if(tag==='TEXTAREA'||tag==='INPUT'||tag==='SELECT'){
    if(e.key==='Escape')e.target.blur();   // 规范: 输入框聚焦时 Esc 先失焦, 再按一次才关面板(防误关)
    return;
  }
  if(e.repeat)return;
  const k=e.key.toLowerCase();
  if(['arrowup','arrowdown','arrowleft','arrowright',' ','tab'].includes(k))e.preventDefault();
  if(mode==='intro'||mode==='ascend')return;
  if(mode==='play'){
    if(journalOpen&&(k==='arrowleft'||k==='arrowright')){jTab=(k==='arrowleft')?'act':'done';renderJournal();return;}
    keys[k]=true;
    if(sceneActive)return;
    if(k==='e')interact();
    else if(k==='j')toggleJournal();
    else if(k==='m')openManual();
    else if(k==='tab')openMap();
    else if(k==='l')lbOpen();
    else if(k==='i'){try{if(window.INVENTORY&&INVENTORY.open)INVENTORY.open();}catch(e){}}
    else if(k==='b')toggleMute();
    else if(k==='n'){try{if(window.SOCIAL&&!state.interior)SOCIAL.leaveNote((player.x/CT)|0,(player.y/CT)|0,state.world);}catch(e){}}
    else if(k==='q')startPing();
    else if(k==='h')toggleHud();
    else if(k==='escape'){
      if(state.interior&&state.interior!=='__recycler')leaveInterior();
      else openPause();
    }
  }else if(mode==='dialog'){
    if(k==='e'||k==='enter'||k===' ')advanceDialog();
    else if(k>='1'&&k<='9')chooseDialog(+k-1);
    else if(k==='escape')advanceDialog();
  }else if(mode==='modal'){
    if(k==='e'||k==='enter'||k==='escape'||k===' ')closeModal();
  }else if(mode==='manual'){
    if(k==='m'||k==='escape')closeManual();
    else if(k==='arrowleft')manPage(-1);
    else if(k==='arrowright')manPage(1);
    else if(k==='a'&&!manReturn)manPage(-1);
    else if(k==='d'&&!manReturn)manPage(1);
    else if(k==='j')toggleJournal();
  }else if(mode==='bin'){
    if(k==='escape')closeBin();
    else if(k==='m')openManual(0);
  }else if(mode==='asm'){
    if(k==='escape')closeAsm();
    else if(k==='m')openManual(2);
  }else if(mode==='mod'){
    if(k==='escape')closeModPanel();
    else if(k==='m')openManual();
    else if(curPuzzle&&curPuzzle.onKey){try{curPuzzle.onKey(e,api);}catch(err){}}
  }else if(mode==='map'){
    if(k==='tab'||k==='escape'||k==='m')closeMap();
  }else if(mode==='lb'){
    if(k==='escape'||k==='l')lbClose();
  }else if(mode==='inv'){
    if(k==='escape'||k==='i'){try{if(window.INVENTORY)INVENTORY.close();}catch(e){}}
  }else if(mode==='pause'){
    if(k==='escape')closePause();
  }
});
addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
function escTop(){ // Esc 从输入框冒出(先失焦, 再按一次才关 — 防误关由 blur 实现)
  if(mode==='asm')closeAsm(); else if(mode==='bin')closeBin();
  else if(mode==='mod')closeModPanel(); else if(mode==='manual')closeManual();
  else if(mode==='pause')closePause();
}

      toast(L('Save code copied — paste it somewhere safe.','存档码已复制——粘到安全的地方保存。'));}catch(e){toast(L('Export failed.','导出失败。'));}

   node: {sp,t,choices:[{t,next,do}],next}  sp/t/choices.t 可为 {en,zh} */
const PIDS={'回声':'PID 0x2A','Echo':'PID 0x2A','进制商人':'PID 16','Radix Merchant':'PID 16',
  '老哨兵':'PID 1','Old Sentinel':'PID 1','你':'USER','You':'USER','？？？':'SIG?','???':'SIG?'};
let dlg=null;
let curTalkNpc=null;   // 本次对话的发起 NPC {n,isMod,iid} — 对话结束后按最新 flag 重记「已听过」, 气泡才会熄灭
function startDialog(nodes,onEnd){
  if(!nodes||!nodes.length)return;
  curTalkNpc=null;     // 演出/系统对话不携带 NPC; NPC 对话在调用 startDialog 之后再登记
  dlg={nodes,i:0,onEnd:onEnd||null};
  $('dlgP').style.display='block';setMode('dialog');renderDialog();
}
/* 打字机: 带标记的句子直接显示只留光标节奏; 纯文本逐字; E 先放完再前进 */
function typeCps(){try{const v=localStorage.getItem('bitescape_cps');return v==null?48:+v;}catch(e){return 48;}}
function typewrite(el,html){
  const cps=typeCps();
  clearInterval(typewrite._t);typewrite._t=null;
  const tmp=document.createElement('div');tmp.innerHTML=html;
  const plain=tmp.textContent||'';
  if(cps<=0||tmp.querySelector('*')){
    el.innerHTML=html;
    el.classList.add('type-caret');
    setTimeout(()=>el.classList.remove('type-caret'),Math.min(1200,plain.length*1000/(cps||48)));
    return;
  }
  el.classList.add('type-caret');
  el.textContent='';let i=0;
  typewrite._full=plain;typewrite._el=el;
  typewrite._t=setInterval(()=>{
    el.textContent=plain.slice(0,++i);
    if(i>=plain.length){clearInterval(typewrite._t);typewrite._t=null;el.classList.remove('type-caret');}
  },1000/cps);
}
function typeSkip(){
  if(!typewrite._t)return false;
  clearInterval(typewrite._t);typewrite._t=null;
  if(typewrite._el){typewrite._el.textContent=typewrite._full||'';typewrite._el.classList.remove('type-caret');}
  return true;
}
function renderDialog(){
  const n=dlg.nodes[dlg.i];
  const sp=TT(n.sp||'');
  $('dlgName').innerHTML=(PIDS[sp]?'<span class="pid">'+PIDS[sp]+'</span>':'')+esc(sp);
  typewrite($('dlgText'),TT(n.t||''));
  const ch=$('dlgChoices');ch.innerHTML='';
  if(n.choices){
    $('dlgHint').textContent='[1-'+n.choices.length+'] '+TT(L('choose','选择'));
    n.choices.forEach((c,i)=>{
      const b=document.createElement('button');b.className='btn';
      b.innerHTML=(i+1)+'. '+esc(TT(c.t));b.onclick=()=>chooseDialog(i);ch.appendChild(b);
    });
  }else $('dlgHint').textContent=(dlg.i>=dlg.nodes.length-1?'[E] '+TT(L('end','结束')):'[E] '+TT(L('continue','继续')));
}
function advanceDialog(){
  if(typeSkip())return;       // 第一下 E: 先把这句放完
  const n=dlg.nodes[dlg.i];
  if(n.choices)return;
  sfx.ui();
  gotoDialog((n.next!=null)?n.next:dlg.i+1);
}
function chooseDialog(i){
  const n=dlg.nodes[dlg.i];
  if(!n.choices||!n.choices[i])return;
  const c=n.choices[i];sfx.ui();
  if(c.do)c.do();
  gotoDialog((c.next!=null)?c.next:dlg.i+1);
}
function gotoDialog(i){
  if(!dlg)return;
  if(i<0||i>=dlg.nodes.length){endDialog();return;}
  dlg.i=i;renderDialog();
}
function endDialog(){
  typeSkip();
  $('dlgP').style.display='none';
  const cb=dlg&&dlg.onEnd;dlg=null;setMode('play');
  if(cb)cb();
  // 对话彻底结束(未被 onEnd 链式接续)后重记签名: 对话中推进了任务/flag 导致开场白变化时, ❕ 在此正确熄灭
  if(!dlg&&curTalkNpc){
    try{
      const c=curTalkNpc;
      if(c.isMod){
        if(state.interior===c.iid){
          delete npcSigCache['m_'+c.iid+'_'+c.n.id];
          state.flags['heard_m_'+c.iid+'_'+c.n.id]=modNpcSig(c.n);
        }
      }else{
        state.flags['heard_'+c.n.id]=engineNpcSig(c.n);
      }
    }catch(e){}
    curTalkNpc=null;
  }
}

/* ---------------- 16. 演出系统 api.scene ----------------
   步骤: {say:{name,text}} {dialog:nodes} {toast,long} {glitch:0..1,ms}
         {sfx:'ok'} {wait:ms} {move:{npcId,x,y,ms}} {setFlag:{k,v}}
         {give:{id,name}} {run:fn} / {worldChange:fn} */
let sceneActive=false;
let glitchUntil=0, glitchPow=0.7;
let camOverride=null;   // 演出用镜头点 {x,y}(像素); null=跟随玩家
function runScene(steps,done){
  let i=0; sceneActive=true;
  function next(){
    if(!steps||i>=steps.length){sceneActive=false;drawHUD();renderJournal();if(done)done();return;}
    const s=steps[i++];
    try{
      if(s.run||s.worldChange){(s.run||s.worldChange)();return next();}
      if(s.setFlag){state.flags[s.setFlag.k]=(s.setFlag.v===undefined)?true:s.setFlag.v;save();return next();}
      if(s.give){giveItemEng(s.give.id,s.give.name);return next();}
      if(s.sfx){if(sfx[s.sfx])sfx[s.sfx]();return next();}
      if(s.toast!=null){toast(s.toast,s.long);return next();}
      if(s.glitch!=null){glitchPow=s.glitch||0.7;glitchUntil=performance.now()+(s.ms||500);sfx.glitch();return next();}
      if(s.wait){setTimeout(next,s.wait);return;}
      if(s.say){startDialog([{sp:s.say.name,t:s.say.text}],next);return;}
      if(s.dialog){startDialog(s.dialog,s.dialog.onEnd?function(){s.dialog.onEnd();next();}:next);return;}
      if(s.move){sceneMove(s.move,next);return;}
      if(s.pan){scenePan(s.pan,next);return;}
      if(s.panReset){camOverride=null;return next();}
    }catch(e){try{window.onerror('scene:'+e,'',0);}catch(_){}}
    next();
  }
  next();
}
function findSceneNpc(id){
  if(state.interior&&IMODS[state.interior])return (IMODS[state.interior].npcs||[]).find(n=>n.id===id);
  return curNpcs().find(n=>n.id===id);
}
function sceneMove(mv,next){
  const n=findSceneNpc(mv.npcId);
  if(!n){next();return;}
  const kx=state.interior?'x':'tx', ky=state.interior?'y':'ty';
  const x0=n[kx],y0=n[ky],x1=mv.x,y1=mv.y;
  const steps=Math.max(1,((mv.ms||700)/33)|0);let i=0;
  (function tick(){
    i++;const p=Math.min(1,i/steps);
    n[kx]=x0+(x1-x0)*p; n[ky]=y0+(y1-y0)*p;
    if(p>=1)next(); else setTimeout(tick,33);
  })();
}
function scenePan(pv,next){
  const sx=camOverride?camOverride.x:player.x, sy=camOverride?camOverride.y:player.y;
  const tx2=pv.x*CT, ty2=pv.y*CT;
  const steps=Math.max(1,((pv.ms||1000)/33)|0);let i=0;
  camOverride={x:sx,y:sy};
  (function tick(){
    i++;const p0=Math.min(1,i/steps);
    const p=p0<0.5?2*p0*p0:1-Math.pow(-2*p0+2,2)/2;   // ease-in-out
    camOverride.x=sx+(tx2-sx)*p; camOverride.y=sy+(ty2-sy)*p;
    if(p0>=1)next(); else setTimeout(tick,33);
  })();
}

/* ---------------- 8. 任务系统 (引擎侧) ----------------
   questChanged() = 任务/步骤/线索一切状态变化的中央出口:
   HUD 追踪器 + 日志 + 线索收口一律走这里重算 (修"追踪器脱同步"类 bug 的治本通道) */
function questChanged(){
  try{pruneClues();}catch(e){}
  try{renderJournal();}catch(e){}
  try{drawHUD();}catch(e){}
}
function addQuest(id,text,type){
  if(state.quests.find(q=>q.id===id))return;
  state.quests.push({id,text,type,done:false});
  sfx.quest();toast(TT(L('◇ New quest: ','◇ 新任务: '))+TT(text));questChanged();save();
}
function updQuest(id,text){const q=state.quests.find(x=>x.id===id);if(q&&!q.done){q.text=text;questChanged();}}
function doneQuest(id){
  const q=state.quests.find(x=>x.id===id);
  if(q&&!q.done){q.done=true;sfx.ok();toast(TT(L('✔ Quest complete: ','✔ 任务完成: '))+TT(q.text));refAdd(8);questChanged();save();lbReport();soContribute(1);
    if(id!=='m1'&&id!=='m2')setTimeout(()=>fbAsk(id,q.text),2600);}
}
function questDone(id){const q=state.quests.find(x=>x.id===id);return !!(q&&q.done);}
/* --- 线索生命周期: 目标达成后自动从「线索」区退场 ---
   resolvedWhen 谓词按 raw 的 en 形式登记(存档里只存数据, 不存函数) */
const CLUE_DONE={
  '00001100 : 00111010': ()=>!!state.flags.ghostDone,                 // 刻痕墙坐标: 幽灵节点已找到
  '0x2A = 42':           ()=>!!state.asm,                              // 商人情报: 神殿终端已 OUT 42
  'CORRUPTION << LOWER LAYER': ()=>!!state.ascended,                   // 腐蚀来源: 已亲自下潜
  'Reboot Tower · 8 locks': ()=>litCount()>=8,                        // 八道锁: 已全断
  'FRAGMENT_09.tmp':     ()=>!!state.flags.kn_ending,                  // 第九领域: 结局已见分晓
  'GHOST_KEY':           ()=>!!state.flags.kn_ending,                  // 无门之钥: 门已开过
};
function clueKey(raw){return (raw&&raw.en!=null)?raw.en:raw;}
function pruneClues(){
  const before=state.clues.length;
  state.clues=state.clues.filter(c=>{
    const f=(c.resolvedWhen&&CLUE_DONE[c.resolvedWhen])||CLUE_DONE[clueKey(c.raw)];
    let done=false;try{done=!!(f&&f());}catch(e){}
    return !done;
  });
  if(state.clues.length!==before)save();
}
function addClue(title,raw,hint){
  if(state.clues.find(c=>clueKey(c.raw)===clueKey(raw)))return;
  state.clues.push({title,raw,hint});toast(L('Clue added to journal (J)','线索已记入日志 (J)'));questChanged();save();
}
function removeClue(raw){state.clues=state.clues.filter(c=>clueKey(c.raw)!==clueKey(raw));questChanged();save();}
function collect(item){
  if(state.collected.includes(item))return;
  state.collected.push(item);sfx.pickup();drawHUD();renderJournal();save();
}
/* 重启塔亮格: 8 道锁 = 神殿 + 6 编号领域 + 深层世界(协议塔&深渊, 合一道) */
function litCount(){
  let n=0;
  if(state.asm)n++;
  CHAPTERS.forEach(c=>{if(chapterDone(c.mod))n++;});
  if(modMainDone('net')&&modMainDone('kernel'))n++;
  return Math.min(8,n);
}
function modMainDone(modId){
  const m=MODS[modId];if(!m)return false;
  const mains=(m.quests||[]).filter(q=>q.line==='main');
  if(!mains.length)return false;
  return mains.every(q=>state.mq[q.id]&&state.mq[q.id].done);
}

let journalOpen=false, jTab='act';
function toggleJournal(){
  journalOpen=!journalOpen;sfx.ui();
  if(journalOpen)try{reevalSteps();}catch(e){}
  renderJournal();
  if(journalOpen&&state.tut===3)tutJournalOpened();
}
function stepStateOf(q){const s=state.mq[q.id];return s||{steps:{},done:false};}
function journalEntries(){
  const act=[],doneL=[];
  const fb=(qid)=>' <span class="jfb" data-qid="'+esc(qid)+'" title="'+TT(L('board','留言板'))+'">💬</span>';
  state.quests.forEach(q=>{
    let h='<div class="q '+(q.done?'done ':'')+(q.type==='hidden'?'hid':'')+'">'+TT(q.text)+(q.done?fb(q.id):'')+'</div>';
    if(q.id==='m4'&&!q.done){
      CHAPTERS.forEach(c=>{
        const m=MODS[c.mod];
        if(!m){h+='<div class="st">'+TT(L('Ch.','第'))+c.n+TT(L('','章'))+' — '+TT(L('signal lost (domain sealed)','信号丢失(领域封印)'))+'</div>';return;}
        const r=chapterRealm(c.mod);
        h+='<div class="st'+(chapterDone(c.mod)?' done':'')+'">'+TT(r?r.name:m.title)+
           (c.mod==='asm'?' <span class="dim">'+TT(L('(free challenge)','(自由挑战, 不挡飞升)'))+'</span>':'')+'</div>';
      });
    }
    (q.done?doneL:act).push({sec:q.type,html:h});
  });
  MODLIST.forEach(m=>{
    if(!state.flags['visited_'+m.id])return;
    (m.quests||[]).forEach(q=>{
      const st=stepStateOf(q),sec=(q.line==='main')?'main':(q.line==='hidden'?'hidden':'side');
      let h='<div class="q '+(st.done?'done':'')+'">'+TT(q.title)+' <span class="dim" style="font-size:10px">['+TT(m.title)+']</span>'+(st.done?fb(q.id):'')+'</div>';
      if(!st.done)(q.steps||[]).forEach(sp=>{h+='<div class="st'+(st.steps[sp.id]?' done':'')+'">'+TT(sp.text)+'</div>';});
      (st.done?doneL:act).push({sec,html:h});
    });
  });
  return {act,doneL};
}
function renderJournal(){
  const el=$('journal');
  el.style.display=journalOpen?'block':'none';
  if(!journalOpen)return;
  try{pruneClues();}catch(e){}
  const {act,doneL}=journalEntries();
  let h='<h3>'+TT(L('QUEST LOG','任务日志'))+' <span class="dim" style="float:right;font-weight:normal">J</span></h3>';
  /* 最近事件回看: toast 零丢失兜底 */
  if(state.recentEvents&&state.recentEvents.length){
    h+='<details id="jRecent"'+(renderJournal._recOpen?' open':'')+'><summary>▸ '+TT(L('RECENT EVENTS','最近事件'))+' ('+state.recentEvents.length+')</summary>';
    state.recentEvents.slice().reverse().forEach(ev=>{h+='<div class="rev">· '+esc(ev.t)+'</div>';});
    h+='</details>';
  }
  h+='<div class="jtabs">'+
     '<div class="jtab'+(jTab==='act'?' cur':'')+'" id="jtabA">'+TT(L('IN PROGRESS','进行中'))+' '+act.length+'</div>'+
     '<div class="jtab'+(jTab==='done'?' cur':'')+'" id="jtabD">'+TT(L('DONE','已完成'))+' '+doneL.length+'</div></div>'+
     '<div class="dim" style="font-size:10px;margin-bottom:4px">'+TT(L('← → switch tab','← → 切换页签'))+'</div>';
  if(jTab==='act'){
    const secs=[['main',L('MAIN','主线')],['side',L('SIDE','支线')],['hidden','??? ']];
    secs.forEach(([type,label])=>{
      h+='<div class="sec">'+TT(label)+'</div>';
      let any=false;
      act.filter(e=>e.sec===type).forEach(e=>{any=true;h+=e.html;});
      if(type==='hidden'){
        if(!state.quests.find(q=>q.id==='h_arg')){any=true;
          h+='<div class="q hid dim">'+TT(L('??? — something is carved on a wall, somewhere.','??? — 好像有谁在某面墙上刻了什么。'))+'</div>';}
        if(!state.quests.find(q=>q.id==='h_buried')){any=true;
          h+='<div class="q hid dim">'+TT(L('??? — the far edge of the wasteland hums faintly.','??? — 荒地的尽头, 有极轻的嗡鸣。'))+'</div>';}
      }
      if(!any){
        h+='<div class="dim" style="font-size:11px">'+
          TT(type==='side'?L('(People out there need help — go talk to them)','（世界里有人需要帮忙——去找他们聊聊）')
            :type==='hidden'?L('(Some things hide where no one looks)','（有些东西藏在没人看的角落）')
            :L('(all clear — for now)','（当前全部完成）'))+'</div>';
      }
    });
    if(state.clues.length){
      h+='<div class="sec">'+TT(L('CLUES','线索'))+'</div>';
      state.clues.forEach(c=>h+='<div class="clue"><b>'+TT(c.title)+'</b><br><code>'+esc(TT(c.raw))+'</code><br><span class="dim">'+TT(c.hint)+'</span></div>');
    }
  }else{
    if(!doneL.length)h+='<div class="dim" style="font-size:11px;margin-top:8px">'+TT(L('(nothing completed yet)','（还没有完成的条目）'))+'</div>';
    doneL.forEach(e=>{h+=e.html;});
  }
  el.innerHTML=h;
  const a=$('jtabA'),d=$('jtabD');
  if(a)a.onclick=()=>{jTab='act';renderJournal();};
  if(d)d.onclick=()=>{jTab='done';renderJournal();};
  const rec=$('jRecent');
  if(rec)rec.ontoggle=()=>{renderJournal._recOpen=rec.open;};
}

const DEX_BUILTIN=[
  {syl:'1.1 Data representation — binary, place value',src:L('Gate Terminal','门控终端')},
  {syl:'4.1/4.2 Processor & assembly language',src:L('Processor Temple','处理器神殿')},
];
let DEX_ALL=[]; // 注册模块后填充 {syl,src}
function buildDex(){
  const seen=new Set();DEX_ALL=[];
  DEX_BUILTIN.forEach(d=>{if(!seen.has(d.syl)){seen.add(d.syl);DEX_ALL.push(d);}});
  MODLIST.forEach(m=>{
    (m.quests||[]).concat(m.puzzles||[]).forEach(it=>{
      if(it.syllabus&&!seen.has(it.syllabus)){seen.add(it.syllabus);DEX_ALL.push({syl:it.syllabus,src:m.title});}
    });
  });
}
function collectDex(syl){
  if(!syl||state.dex.includes(syl))return;
  if(!DEX_ALL.find(d=>d.syl===syl))DEX_ALL.push({syl,src:''});
  state.dex.push(syl);sfx.pickup();
  toast(TT(L('◈ Syllabus dex: ','◈ 大纲图鉴收录: '))+esc(syl)+' ('+state.dex.length+'/'+DEX_ALL.length+')',true);
  save();lbReport();
}

const ASM_DEFAULT_L=L(
`; CPU-9618 field terminal
; GOAL: make OUT print 42
; immediate bus corroded: #n only 0~15
; memory [20] and [21] hold two residual numbers, see right panel ->
; (instruction set: manual page 3, press M - manual docks beside)

`,
`; CPU-9618 现场终端
; 目标: 让 OUT 输出 42
; 立即数总线损坏: #n 仅支持 0~15
; 内存 [20] 和 [21] 里残留着两个数, 看右侧面板 →
; (指令表: 手册第 3 页, 按 M——手册会侧挂在旁边)

`);
let cpu=null, prog=null, labels=null;
function newCPU(){
  cpu={acc:0,ix:0,pc:0,flag:null,mem:new Array(32).fill(0),out:[],halt:false};
  cpu.mem[20]=30;cpu.mem[21]=12;
}
function openAsm(){
  $('asmP').classList.add('on');$('asmP').style.display='flex';
  setMode('asm');sfx.open();
  if(!$('asmSrc').value)$('asmSrc').value=TT(ASM_DEFAULT_L);
  newCPU();prog=null;
  asmStatus(state.asm?TT(L('Core already reclaimed. Terminal stays free for programming.','核心已取回。终端仍可自由编程。'))
                     :TT(L('Write your program, then LOAD.','写好程序后点「装载」。')),'');
  renderCPU();
}
function closeAsm(){$('asmP').classList.remove('on');$('asmP').style.display='none';setMode('play');}
$('asmClose').onclick=closeAsm;

function asmStatus(msg,cls){const s=$('asmStatus');s.textContent=msg;s.className=cls||'';}
function assemble(){
  const src=$('asmSrc').value.split(/\r?\n/);
  const p=[],lb={};let err=null;
  src.forEach((raw,idx)=>{
    if(err)return;
    let line=raw.replace(/;.*$/,'').replace(/\/\/.*$/,'').trim();
    if(!line)return;
    const lm=line.match(/^([A-Za-z_]\w*):\s*(.*)$/);
    if(lm){lb[lm[1].toUpperCase()]=p.length;line=lm[2].trim();if(!line)return;}
    const sp=line.split(/\s+/);
    const op=sp[0].toUpperCase(),arg=sp.slice(1).join(' ').toUpperCase();
    const OPS=['LDM','LDD','STO','ADD','SUB','INC','DEC','CMP','JMP','JPE','JPN','OUT','END'];
    if(!OPS.includes(op)){err=TT(L('line ','第 '))+(idx+1)+TT(L(': unknown instruction "','行: 未知指令 "'))+op+TT(L('" (see manual §3)','" (指令表见手册§3)'));return;}
    p.push({op,arg,ln:idx+1,raw:line});
  });
  if(err){asmStatus(TT(L('Assemble failed — ','汇编失败 — '))+err,'err');sfx.err();prog=null;return false;}
  if(!p.length){asmStatus(TT(L('The program is empty. Write something.','程序是空的。写点什么吧。')),'err');prog=null;return false;}
  prog=p;labels=lb;newCPU();
  asmStatus(TT(L('Loaded: ','装载完成: '))+p.length+TT(L(' instructions. STEP or RUN.',' 条指令。单步或运行。')),'');
  renderCPU();return true;
}
function immVal(arg,ins){
  const n=parseInt(arg.slice(1),10);
  if(isNaN(n))throw TT(L('line ','第 '))+ins.ln+TT(L(': bad immediate "','行: 立即数格式错误 "'))+arg+'"';
  if(n<0||n>15)throw TT(L('line ','第 '))+ins.ln+TT(L(': immediate bus corroded, #n only 0~15 (you gave ','行: 立即数总线损坏, #n 仅支持 0~15 (你给了 '))+n+TT(L('). Fetch big numbers with LDD.','), 大数从内存取: LDD'));
  return n;
}
function memAddr(arg,ins){
  const a=parseInt(arg,10);
  if(isNaN(a)||a<0||a>31)throw TT(L('line ','第 '))+ins.ln+TT(L(': address must be 0~31 "','行: 地址须为 0~31 "'))+arg+'"';
  return a;
}
function stepCPU(){
  if(!prog){if(!assemble())return;}
  if(cpu.halt){asmStatus(TT(L('Halted. LOAD again to retry.','已停机。重新「装载」可再来。')),'');return;}
  if(cpu.pc>=prog.length){cpu.halt=true;asmStatus(TT(L('Program ran off the end without END — PC fell off the cliff.','程序跑完了但没有 END —— PC 掉出了程序末尾。')),'err');sfx.err();renderCPU();return;}
  const ins=prog[cpu.pc];
  let jumped=false;
  try{
    switch(ins.op){
      case 'LDM': cpu.acc=immVal(ins.arg,ins);break;
      case 'LDD': cpu.acc=cpu.mem[memAddr(ins.arg,ins)];break;
      case 'STO': cpu.mem[memAddr(ins.arg,ins)]=cpu.acc;break;
      case 'ADD': cpu.acc+=ins.arg[0]==='#'?immVal(ins.arg,ins):cpu.mem[memAddr(ins.arg,ins)];break;
      case 'SUB': cpu.acc-=ins.arg[0]==='#'?immVal(ins.arg,ins):cpu.mem[memAddr(ins.arg,ins)];break;
      case 'INC': if(ins.arg!=='ACC'&&ins.arg!=='IX')throw TT(L('line ','第 '))+ins.ln+TT(L(': INC takes ACC or IX','行: INC 后面写 ACC 或 IX'));
                  if(ins.arg==='ACC')cpu.acc++;else cpu.ix++;break;
      case 'DEC': if(ins.arg!=='ACC'&&ins.arg!=='IX')throw TT(L('line ','第 '))+ins.ln+TT(L(': DEC takes ACC or IX','行: DEC 后面写 ACC 或 IX'));
                  if(ins.arg==='ACC')cpu.acc--;else cpu.ix--;break;
      case 'CMP': cpu.flag=(cpu.acc===(ins.arg[0]==='#'?immVal(ins.arg,ins):cpu.mem[memAddr(ins.arg,ins)]));break;
      case 'JMP': case 'JPE': case 'JPN':{
        const Lb=ins.arg;
        if(!(Lb in labels))throw TT(L('line ','第 '))+ins.ln+TT(L(': label not found "','行: 找不到标签 "'))+Lb+'"';
        if(ins.op==='JMP'||(ins.op==='JPE'&&cpu.flag===true)||(ins.op==='JPN'&&cpu.flag===false)){cpu.pc=labels[Lb];jumped=true;}
        if((ins.op==='JPE'||ins.op==='JPN')&&cpu.flag===null)throw TT(L('line ','第 '))+ins.ln+TT(L(': no CMP yet, FLAG is empty','行: 还没 CMP 过, FLAG 是空的'));
        break;}
      case 'OUT': cpu.out.push(cpu.acc);if(cpu.acc===42)asmWin();break;
      case 'END': cpu.halt=true;break;
    }
  }catch(e){cpu.halt=true;asmStatus(String(e),'err');sfx.err();renderCPU();return;}
  if(!jumped)cpu.pc++;
  if(!$('asmStatus').classList.contains('win')){
    if(cpu.halt)asmStatus(TT(L('Halted (END). Output on the right.','程序停机 (END)。输出见右侧。')),'');
    else asmStatus(TT(L('Exec L','执行 L'))+ins.ln+': '+ins.raw+'   →  PC='+cpu.pc,'');
  }
  sfx.step();renderCPU();
}
function runCPU(){
  if(!prog){if(!assemble())return;}
  let n=0;
  while(!cpu.halt&&cpu.pc<prog.length&&n<500){stepCPU();n++;if($('asmStatus').className==='err')return;}
  if(n>=500){asmStatus(TT(L('500 steps and still going — probably an infinite loop. Check your jumps.','执行了 500 步还没停 —— 疑似死循环。检查跳转条件。')),'err');sfx.err();}
  renderCPU();
}

const MODS={};       // id -> spec (仅内容模块)
const MODLIST=[];    // 注册顺序
const IMODS={};      // id -> spec (含 __recycler 等内置室内)
function registerModules(){
  (window.GAME_MODULES||[]).forEach(m=>{
    try{
      if(!m||!m.id||MODS[m.id])return;
      if(!m.interior||!m.interior.tiles){window.onerror('module '+m.id+' has no interior','',0);return;}

    }catch(e){window.onerror('register '+((m&&m.id)||'?')+': '+e,'',0);}
  });

    interior:{w:14,h:10,playerStart:{x:7,y:7},
      tiles:(function(){const t=[];for(let y=0;y<10;y++){t[y]=[];for(let x=0;x<14;x++)t[y][x]=(x===0||y===0||x===13||y===9)?1:0;}return t;})()},
    npcs:[],steles:[

    puzzles:[],quests:[]
  };
  buildDex();buildCodex();
}

/* --- 模块任务 --- */
function findModQuest(qid){
  for(const m of MODLIST)for(const q of (m.quests||[]))if(q.id===qid)return {m,q};
  return null;
}
function findModStep(sid){
  for(const m of MODLIST)for(const q of (m.quests||[]))for(const s of (q.steps||[]))
    if(s.id===sid)return {m,q,s};
  return null;
}
function modCompleteStep(a,b){
  let hit=null;
  if(b!=null){const r=findModQuest(a);if(r)hit={m:r.m,q:r.q,s:(r.q.steps||[]).find(x=>x.id===b)};}
  else hit=findModStep(a);
  if(!hit||!hit.q)return;
  const sid=hit.s?hit.s.id:b;
  const st=state.mq[hit.q.id]=state.mq[hit.q.id]||{steps:{},done:false};
  if(st.done||st.steps[sid])return;
  st.steps[sid]=true;
  sfx.ok();refAdd(5);
  if(hit.s)toast(TT(L('✓ ','✓ '))+TT(hit.s.text));
  if(mode==='mod'&&curPuzzle&&curPuzzle.syllabus)collectDex(curPuzzle.syllabus);
  if(mode==='mod'&&curPuzzle)reportHintSolved(curPuzzle.id);
  if((hit.q.steps||[]).every(s=>st.steps[s.id]))modQuestComplete(hit.q.id);
  questChanged();save();
}
/* 任务步骤回溯评估: step 可带 check(api)=>bool 谓词;
   任务激活(进领域)/打开日志时重评, 世界状态已满足的步骤直接勾上 */
function reevalSteps(){
  MODLIST.forEach(m=>{
    if(!state.flags['visited_'+m.id])return;
    (m.quests||[]).forEach(q=>{
      const st=state.mq[q.id];if(st&&st.done)return;
      (q.steps||[]).forEach(sp=>{
        if(st&&st.steps[sp.id])return;
        if(typeof sp.check==='function'){
          let ok=false;try{ok=!!sp.check(api);}catch(e){}
          if(ok)modCompleteStep(q.id,sp.id);
        }
      });
    });
  });
}
function modQuestComplete(qid){
  const r=findModQuest(qid);if(!r)return;
  const st=state.mq[qid]=state.mq[qid]||{steps:{},done:false};
  if(st.done)return;
  (r.q.steps||[]).forEach(s=>st.steps[s.id]=true);
  st.done=true;
  sfx.quest();refAdd(15);
  toast(TT(L('✔ Quest complete: ','✔ 任务完成: '))+TT(r.q.title));
  if(r.q.syllabus)collectDex(r.q.syllabus);
  if((r.q.line||'side')==='main'||qid==='asm_main'){
    if(chapterDone(r.m.id)||modMainDone(r.m.id)){
      pendingLight=r.m.id;   // 出门时播「区域点亮」强制看见的演出 (在室内看不到野外建筑)
    }
    if(mode==='map')renderMap();
  }
  if(qid==='kn_end')doneQuest('m5');
  try{if(r.m.onQuestComplete)r.m.onQuestComplete(qid,api);}catch(e){}
  questChanged();save();lbReport();soContribute(1);
  setTimeout(()=>fbAsk(qid,r.q.title),2600);
  setTimeout(checkAscend,1600);
}

/* --- 模块 api (协议: 见各 domain_*.js 头注释) --- */
const api={
  toast(m,long){toast(m,long);},
  sfx(k){try{if(sfx[k])sfx[k]();else sfx.ui();}catch(e){}},
  giveItem(id,name){giveItemEng(id,name);},
  hasItem(id){return hasItemEng(id);},
  completeStep(a,b){modCompleteStep(a,b);},
  questDone(qid){ // 模块用作"强制标记完成"; 也可当查询用(返回布尔)
    const r=findModQuest(qid);
    if(r){const st=state.mq[qid];if(!st||!st.done)modQuestComplete(qid);return !!(state.mq[qid]&&state.mq[qid].done);}
    return questDone(qid);
  },
  openDialog(nodes,onEnd){
    if(typeof nodes==='function')nodes=nodes(api);
    startDialog(nodes,onEnd||(nodes&&nodes.onEnd)||null);
  },
  closePanel(){closeModPanel();},
  setFlag(k,v){
    state.flags[k]=(v===undefined)?true:v;save();
    try{asmStatHook(k);}catch(e){}      // CO-13: asm_best_N → 全班指令数直方图
  },
  getFlag(k){return state.flags[k];},
  onFail(pid){ // 失败计数钩子: 模块读 getFlag('fail_'+pid); 顺带上报教师面板「需要关注」
    const k='fail_'+pid;state.flags[k]=(state.flags[k]||0)+1;save();
    try{reportHint(pid,state.flags[k],false);}catch(e){}
    return state.flags[k];
  },
  teleport(tx,ty){player.x=(tx+0.5)*CT;player.y=(ty+0.5)*CT;},
  scene(steps,done){runScene(steps,done);},
  quest:{add:addQuest,done:doneQuest,isDone:questDone},
};

Object.defineProperty(api,'TILE',{get(){return CT;}});
Object.defineProperty(api,'world',{get(){return state.world;}});

/* --- 室内进出 (空间连续性三件套: 门内一步出生/开门音效/≤350ms 淡入淡出; 5s 内重复进出跳过动画) --- */
const doorStamp={};
function doorFade(cb){
  const f=$('fadeOv');
  $('fadeTxt').textContent=TT(L('· linking subsystem ·','· 连接子系统 ·'));
  f.style.opacity='1';
  setTimeout(()=>{try{cb();}catch(e){} f.style.opacity='0';},160);
}
function doorWhoosh(){sfx.door();beep(240,.12,'sine',.03);setTimeout(()=>beep(180,.14,'sine',.025),70);}
function enterInterior(id){
  const m=IMODS[id];if(!m)return;
  const quick=doorStamp[id]&&(Date.now()-doorStamp[id]<5000);
  doorStamp[id]=Date.now();
  const body=()=>{
    state.retPos={world:state.world,interior:null,px:player.x,py:player.y};
    state.interior=id;
    setContext();
    const ps=m.interior.playerStart||{x:2,y:2};
    player.x=(ps.x+0.5)*CT;player.y=(ps.y+0.5)*CT;   // 出生位=门内一步
    player.dir='up';                                  // 面朝屋内
    state.flags['visited_'+id]=true;
    try{reevalSteps();}catch(e){}
    questChanged();save();
    try{soRefreshNotes();}catch(e){}
    try{if(m.onEnter)m.onEnter(api);}catch(e){window.onerror('onEnter '+id+': '+e,'',0);}
  };
  if(quick){sfx.door();body();}
  else{doorWhoosh();doorFade(body);}
}
let pendingLight=null;   // 领域全清 → 出门时播「区域点亮」演出
function leaveInterior(){
  if(!state.interior)return;
  const id=state.interior;
  const quick=doorStamp[id]&&(Date.now()-doorStamp[id]<5000);
  doorStamp[id]=Date.now();
  const body=()=>{
    const r=state.retPos;
    state.interior=null;state.retPos=null;
    if(r&&r.world)state.world=r.world;
    setContext();
    if(r){player.x=r.px;player.y=r.py;}
    player.dir='down';                                // 出屋=门外一步, 面朝屋外
    save();
    const pl=pendingLight;pendingLight=null;
    if(pl)setTimeout(()=>runLightScene(pl),350);
    else toast(L('Back outside.','回到野外。'));
  };
  if(quick){sfx.door();body();}
  else{doorWhoosh();doorFade(body);}
}

/* --- 「区域点亮」强制看见的演出: 世界内建筑当场亮起(镜头 pan 过去) + 自动弹小地图扫亮 --- */
let litFx=null;        // {tx,ty,t0} 世界内点亮爆发
let mapFlash=null;     // {id,t0}   小地图扫亮动画
function runLightScene(modId){
  const r=curRealms().find(x=>x.mod===modId);
  if(!r||state.interior){toast(L('◈ District cleared ◈','◈ 领域全清 ◈'),true);return;}
  const name=TT(r.name);
  runScene([
    {sfx:'quest'},
    {pan:{x:r.tx,y:r.ty,ms:900}},
    {run(){litFx={tx:r.tx,ty:r.ty,t0:performance.now()};sfx.tp();}},
    {glitch:0.4,ms:350},
    {toast:TT(L('◈ ','◈ '))+name+TT(L(' — RESTORED. The lights are back on. ◈',' —— 修复完成, 灯亮起来了 ◈')),long:true},
    {wait:1400},
    {panReset:true},
    {run(){
      if(!state.flags.mapUnlock)return;
      mapFlash={id:modId,t0:performance.now()};
      openMap();
      const step=()=>{ if(!mapFlash)return;
        if(performance.now()-mapFlash.t0>1600){
          mapFlash=null;
          if(mode==='map')closeMap();
          toast(L('◈ It stays lit on your map — Tab to check anytime ◈','◈ 它会一直亮在你的地图上 —— 随时按 Tab 查看 ◈'));
          return; }
        if(mode==='map')renderMap();
        requestAnimationFrame(step); };
      requestAnimationFrame(step);
    }},
  ]);
}

/* ---------------- 13c. 网络周边: 提示上报 · 匿名统计 · 教师章节闸门 · 维护者的信 ----------------

const DBROOT='https://cs-vocab-default-rtdb.asia-southeast1.firebasedatabase.app';
function lbNameKey(){

/* 提示/卡关使用上报: /bitescape/hints/{nameKey}/{puzzleId} = {tier,ts,solved}

function reportHint(pid,tier,solved){

/* CO-9 「有人在这里卡过」匿名微光: 不点名的共情 */
let hintAgg=null,hintAggT=0;
function hintStatLine(pid){
  const put=n=>{
    if(!n||mode!=='mod'||!curPuzzle||curPuzzle.id!==pid)return;
    const d=document.createElement('div');
    d.className='dim';d.style.cssText='font-size:10.5px;margin-top:10px;text-align:right';
    d.textContent=TT(L(n+' maintainer'+(n>1?'s':'')+' got stuck here before you. You are in good company.',
                       '在你之前, 有 '+n+' 位维护者也在这里卡过。你不是一个人。'));
    $('modBody').appendChild(d);
  };
  const count=()=>{
    let n=0;
    try{Object.keys(hintAgg||{}).forEach(nk=>{if(hintAgg[nk]&&hintAgg[nk][pid])n++;});}catch(e){}
    return n;
  };
  if(hintAgg&&Date.now()-hintAggT<120000){put(count());return;}
  try{
    fetch(DBROOT+'/bitescape/hints.json').then(r=>r.json()).then(j=>{
      hintAgg=j||{};hintAggT=Date.now();put(count());
    }).catch(()=>{});
  }catch(e){}
}
/* CO-13: 汇编关卡全班指令数直方图 (asm 模块置 asm_best_N 时触发) */
function asmStatHook(flagKey){
  const m=/^asm_best_(\d+)$/.exec(flagKey);
  if(!m)return;
  const lv=m[1],best=state.flags[flagKey]|0;
  const nk=lbNameKey();
  if(nk&&best>0){
    try{fetch(DBROOT+'/bitescape/asmstats/lv'+lv+'/'+encodeURIComponent(nk)+'.json',
      {method:'PUT',body:JSON.stringify({n:best,ts:Date.now()})}).catch(()=>{});}catch(e){}
  }
  setTimeout(()=>showAsmHisto(lv,best),1800);
}
function showAsmHisto(lv,mine,tries){
  tries=tries==null?15:tries;
  if(mode!=='play'||sceneActive||dlg){if(tries>0)setTimeout(()=>showAsmHisto(lv,mine,tries-1),1500);return;}
  try{
    fetch(DBROOT+'/bitescape/asmstats/lv'+lv+'.json').then(r=>r.json()).then(j=>{
      if(!j)return;
      const vals=Object.keys(j).map(k=>j[k]&&j[k].n|0).filter(n=>n>0);
      if(vals.length<2)return;   // 只有自己: 不弹
      const buckets={};vals.forEach(n=>{buckets[n]=(buckets[n]||0)+1;});
      const ks=Object.keys(buckets).map(Number).sort((a,b)=>a-b);
      const mx=Math.max.apply(null,ks.map(k=>buckets[k]));
      let rows='';
      ks.forEach(k=>{
        const bar='▮'.repeat(Math.max(1,Math.round(buckets[k]/mx*18)));
        rows+='<div style="font-size:12px">'+String(k).padStart(3,' ')+' <span class="k">'+bar+'</span> '+
          buckets[k]+(k===mine?' <span class="k">◄ '+TT(L('you','你'))+'</span>':'')+'</div>';
      });
      showModal(L('CLASS HISTOGRAM · LV.'+lv+' INSTRUCTION COUNT','全班直方图 · 第 '+lv+' 关指令数'),
        '<div style="text-align:left;font-family:inherit">'+rows+'</div>'+
        '<p class="dim" style="font-size:11px">'+TT(L('Anonymous. Fewer instructions = further left. Someone solved it shorter? Go ask how.',
          '匿名统计。指令越少越靠左。有人比你短? 去问问怎么做到的。'))+'</p>');
    }).catch(()=>{});
  }catch(e){}
}
/* --- 教师章节闸门: /bitescape/config/unlockedChapter (60s 轮询 + 进领域时检查) ---
   null/读取失败 = 老师未设置 → 不硬锁(默认全部开放, 软门仍生效) */
let teacherChapter=null;
function pollTeacherGate(){
  try{
    fetch(DBROOT+'/bitescape/config/unlockedChapter.json').then(r=>r.json()).then(v=>{
      teacherChapter=(v==null)?null:(v|0);
      if(teacherChapter==null)return;
      if(!running){return;}
      if(state.chapSeen===0){state.chapSeen=teacherChapter;save();return;}   // 首次基线, 不演出
      if(state.chapSeen<teacherChapter){
        const c=CHAPTERS.find(x=>x.n===state.chapSeen+1)||CHAPTERS.find(x=>x.n===teacherChapter);
        state.chapSeen=teacherChapter;save();
        if(c)newChapterScene(c);
      }else if(state.chapSeen>teacherChapter){state.chapSeen=teacherChapter;save();}
    }).catch(()=>{});
  }catch(e){}
}
/* 「新领域苏醒」演出 (CO-7 完全体: 游戏更新节奏 = 课程表) */
function newChapterScene(c){
  const r=chapterRealm(c.mod);if(!r)return;

/* ---------------- 14. REF 引用计数 · GC ---------------- */
function refAdd(n){
  if(!state.flags.refIntro){state.ref=Math.max(0,Math.min(100,(state.ref==null?100:state.ref)+Math.max(0,n)));return;}
  const before=state.ref;
  state.ref=Math.max(0,Math.min(100,(state.ref==null?100:state.ref)+n));
  drawHUD();
  if(state.ref<=60&&before>60&&!state.flags.gc60){state.flags.gc60=true;gcEvent(1);}
  if(state.ref<=30&&before>30&&!state.flags.gc30){state.flags.gc30=true;gcEvent(2);}
  if(state.ref<=0&&state.interior!=='__recycler'&&running)enterRecycler();
  save();
}
setInterval(()=>{if(running&&mode!=='intro'&&!sceneActive&&state.flags.refIntro)refAdd(-1);},90000);
function gcEvent(stage){
  glitchPow=0.8;glitchUntil=performance.now()+800;sfx.glitch();
  const say1=L('(static floods your vision for a second — far away, something grey turns its head toward you)<br><span class="k">REF is dropping.</span> The Recycler collects whatever nothing refers to. Do things. Solve things. Matter.',
    '(视野里灌进一秒静电噪声——很远的地方, 一个灰袍身影朝你转过头)<br><span class="k">你的 REF 在往下掉。</span>回收者只收无人引用之物。去做事, 去解题, 去被需要。');
  const say2=L('(the grey figure is closer now. You can see the sickle-pointer clearly. It taps its wrist — where a watch would be)<br><span class="k">REF below 30.</span> One more slide and you\'ll wake up in the Recycle Bin. Complete anything — quests, puzzles, caches — NOW.',
    '(灰袍身影更近了。你能看清那把镰刀指针。它敲了敲手腕——如果它有表的话)<br><span class="k">REF 低于 30。</span>再掉下去你会在回收站里醒来。快去完成任何事——任务、谜题、缓存箱——现在。');
  const msg=stage===1?say1:say2;
  if(mode==='play'&&!sceneActive)startDialog([{sp:L('Echo','回声'),t:msg}]);
  else toast(msg,true);
  save();
}
function enterRecycler(){

function relayUse(d){
  if(state.flags['relay_open_'+d.id]){
    showModal(d.name,TT(L('The gate stands open.','门敞开着。'))+'<br><span class="dim">'+esc(state.flags['relay_names_'+d.id]||'')+'</span>');
    return;

  if(!window.SOCIAL){showModal(d.name,L('Two signature slots, both dark. (social module not loaded)','两个签名槽, 都暗着。(社交模块未加载)'));return;}
  SOCIAL.relayStatus(d.id).then(s=>{
    if(s&&s.open){
      const names=(s.signed||[]).join(TT(L(', ',' 和 ')));
      state.flags['relay_open_'+d.id]=true;
      state.flags['relay_names_'+d.id]=TT(L('Co-signed by ','由 '))+names+TT(L('',' 共同签署'));
      openRelayTiles(d.id);save();

    }else{
      SOCIAL.signRelay(d.id).then(ok=>{

          toast(ok?TT(L('◈ Signed. ','◈ 已签名。'))+got+'/'+need+TT(L(' — the gate waits for one more hand.',' —— 门在等下一只手。'))
                  :L('(the slot did not take your signature — try again)','(签名槽没吃下你的名字——再试一次)'));
        }).catch(()=>{});
      }).catch(()=>{toast(L('(network unreachable)','(网络不可达)'));});
    }
  }).catch(()=>{toast(L('(network unreachable)','(网络不可达)'));});
}

function unlockOk(u){

  if(u.afterQuest&&!questDone(u.afterQuest)&&!(state.mq[u.afterQuest]&&state.mq[u.afterQuest].done))return false;

}

/* --- NPC「有新话」信号语言: 头顶 ❕ 气泡 ---
   判定: 当前 flag 状态下的对话首节点 != 玩家上次听过的 → 有新话;
   没有新话 = 无任何信号(材质闪烁不再当信号用, 名牌 hot 也跟这个走)。 */
const npcSigCache={};
function engineNpcSig(n){
  if(n.id==='echo'){
    if(state.tut<=2)return 'a';
    if(!state.gate)return 'b';
    if(!state.asm)return 'c';
    if(!state.ascended)return 'd';
    return 'e';
  }
  if(n.id==='hex')return state.flags.hexDone?'z':(state.flags.hexMet?'b':'a');
  if(n.id==='sent'){
    if(!state.flags.sentMet)return 'a';
    if(!state.flags.sentDone)return 'p'+STELES_AS.filter(s=>s.frag&&state.steles.includes(s.id)).length;
    return 'z';
  }
  if(n.id==='remn')return 'a';
  return '0';
}
function modNpcSig(n){
  const key='m_'+state.interior+'_'+n.id;
  const c=npcSigCache[key],now=performance.now();
  if(c&&now-c.t<1500)return c.v;
  let v='0';
  try{
    const nodes=(typeof n.dialog==='function')?n.dialog(api):n.dialog;
    if(nodes&&nodes.length)v=String(TT(nodes[0].t||'')).replace(/<[^>]*>/g,'').slice(0,60);
  }catch(e){}
  npcSigCache[key]={t:now,v};
  return v;
}
function npcHasNew(n,isMod){
  const key=isMod?('heard_m_'+state.interior+'_'+n.id):('heard_'+n.id);
  const sig=isMod?modNpcSig(n):engineNpcSig(n);
  return state.flags[key]!==sig;
}
function npcMarkHeard(n,isMod){
  const key=isMod?('heard_m_'+state.interior+'_'+n.id):('heard_'+n.id);
  state.flags[key]=isMod?modNpcSig(n):engineNpcSig(n);
  delete npcSigCache['m_'+state.interior+'_'+n.id];
}
function drawTalkBubble(cx,cy,t){
  const bob=Math.sin(t/320)*2;
  ctx.fillStyle='rgba(8,14,10,.92)';
  ctx.beginPath();ctx.arc(cx,cy+bob,9,0,7);ctx.fill();
  ctx.strokeStyle='#ffce3a';ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#ffce3a';ctx.font='bold 13px monospace';ctx.textAlign='center';
  ctx.fillText('!',cx,cy+4.5+bob);ctx.textAlign='left';
}

    const got=STELES_AS.filter(x=>x.frag&&state.steles.includes(x.id)).length;
    if(state.flags.sentMet&&!state.flags.sentDone)updQuest('s_frag',TT(L('Side: recover 3 memory fragments for the Old Sentinel ','支线: 为老哨兵找回三块记忆残片 '))+'('+got+'/3)');

  if(s.refIntro&&first&&!state.flags.refIntro){
    modalAfter=()=>refIntroShow();

  if(s.arg&&first){
    state.flags.argClue=true;
    addClue(L('The Scratched Wall · coordinates','刻痕之墙·坐标'),'00001100 : 00111010',
      L('Two bytes = two decimals = a map tile [x, y]. Your tile shows bottom-left. Walk there.',

function chunkKey(tx,ty){return ((tx/6)|0)+','+((ty/6)|0);}
function markExplored(){

  const tx=(player.x/CT)|0,ty=(player.y/CT)|0,cx=(tx/6)|0,cy=(ty/6)|0;
  const S=EXP[state.world];

}
function mapZones(){
  if(state.world==='as'){
    const z=[{tx:70,ty:14,r:9,done:!!state.asm,id:'cpu'}];
    REALMS_AS.forEach(r=>{if(r.mod)z.push({tx:r.tx,ty:r.ty,r:9,done:chapterDone(r.mod),id:r.mod});});
    return z;
  }
  return REALMS_A2.map(r=>({tx:r.tx,ty:r.ty,r:10,done:modMainDone(r.mod),id:r.mod}));
}
function renderMap(){
  const mc=$('mapCv'),g=mc.getContext('2d');
  const w=state.world==='a2'?A2W:ASW,h=state.world==='a2'?A2H:ASH;
  const tiles=state.world==='a2'?MAPA2:MAPAS;
  const sc=Math.max(4,Math.min(((620/w)|0),((420/h)|0)));
  mc.width=w*sc;mc.height=h*sc;
  const pal=ART?(ART.palette[WORLD]||ART.palette.as):null;
  g.fillStyle='#04060a';g.fillRect(0,0,mc.width,mc.height);
  const S=EXP[state.world];
  const C=pal?{0:pal.g1,1:pal.dim,2:'#3a4046',3:pal.water,4:pal.mid,5:'#4a4030',6:pal.acc2}
             :{0:'#0c140c',1:'#14351a',2:'#3a4046',3:'#0b2230',4:'#4a3f22',5:'#1c1810',6:'#802020'};
  const zones=mapZones();
  const doneZones=zones.filter(z=>z.done);
  const litColor=state.world==='a2'?'rgba(230,170,255,.20)':'rgba(160,255,170,.18)';
  /* 点亮扫光动画 (区域全清演出): 该区域从暗到亮的呼吸扫光 */
  const flashOf=id=>{
    if(!mapFlash||mapFlash.id!==id)return 0;
    const p=Math.min(1,(performance.now()-mapFlash.t0)/1600);
    return 0.35+0.45*Math.sin(p*Math.PI*3)*(1-p)+p*0.2;
  };
  const seen=(x,y)=>S.has(((x/6)|0)+','+((y/6)|0));
  // 三态: 未探索=雾黑 · 已探索=暗色 · 已完成区域=整片点亮 (战争迷雾对地形与 POI 一视同仁)
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    if(!seen(x,y))continue;                                // 雾
    g.fillStyle=C[tiles[y][x]]||C[0];
    g.fillRect(x*sc,y*sc,sc,sc);
    for(const z of doneZones){
      if((x-z.tx)*(x-z.tx)+(y-z.ty)*(y-z.ty)<=z.r*z.r){    // 点亮
        const fl=flashOf(z.id);
        g.fillStyle=fl?('rgba(200,255,210,'+Math.min(0.85,0.18+fl)+')'):litColor;
        g.fillRect(x*sc,y*sc,sc,sc);break;
      }
    }
  }
  // POI 点: 只画已探索区域内的 (迷雾不漏点); 未交互=亮点, 已交互=暗点
  const dot=(tx,ty,on,col)=>{if(!seen(tx,ty))return;
    g.fillStyle=on?col:'rgba(120,140,120,.45)';g.fillRect(tx*sc-1,ty*sc-1,3,3);};
  if(state.world==='as'){
    STELES_AS.forEach(st=>dot(st.tx,st.ty,!state.steles.includes(st.id),'#ffd45e'));
    CONSOLES_AS.forEach(c=>dot(c.tx,c.ty,true,'#7ad8e8'));
    KDOORS.forEach(k=>dot(k.tx,k.ty,!state.flags['kdoor_'+k.mod],'#7ad8e8'));
    RELAY_DOORS.forEach(d=>dot(d.tx,d.ty,!state.flags['relay_open_'+d.id],'#c86bff'));
  }else{
    STELES_A2.forEach(st=>dot(st.tx,st.ty,!state.steles.includes(st.id),'#ffd45e'));
  }
  curCaches().forEach(c=>dot(c.tx,c.ty,!state.flags['cache_'+state.world+'_'+c.id],'#ffce3a'));
  // 地标: 编号领域画章节数字(完成→✓), 其余画首字母; 未探索且未被引导点亮的不显示
  g.font='bold '+Math.max(12,sc*2)+"px 'Cascadia Code','Microsoft YaHei','PingFang SC',monospace";g.textAlign='center';
  const mark=(tx,ty,ch,col)=>{g.fillStyle=col;g.fillText(ch,tx*sc+sc/2,ty*sc+sc*1.2);};
  const zdone=id=>{const z=zones.find(z=>z.id===id);return z&&z.done;};
  const known=r=>seen(r.tx,r.ty)||state.flags['lit_'+(r.mod||r.id)]||(r.kind==='asm');
  if(state.world==='as'){
    REALMS_AS.forEach(r=>{
      if(!known(r))return;                                 // 战争迷雾: 没见过的地标不出现
      const dn=r.mod?chapterDone(r.mod):(r.kind==='asm'&&state.asm);
      const col=dn?'#7CFC00':(r.mod&&MODS[r.mod]?(unlockOk(MODS[r.mod].unlock)?'#ffd45e':'#666'):(r.kind==='asm'?'#ffd45e':'#555'));

function solid(px,py){

  if(tx<0||ty<0||tx>=MW||ty>=MH)return true;

function move(){
  if(sceneActive)return;
  let dx=0,dy=0;
  if(keys['a']||keys['arrowleft'])dx=-1;
  if(keys['d']||keys['arrowright'])dx=1;
  if(keys['w']||keys['arrowup'])dy=-1;
  if(keys['s']||keys['arrowdown'])dy=1;
  if(dx&&dy){dx*=.71;dy*=.71;}
  if(dx<0)player.dir='left';else if(dx>0)player.dir='right';
  else if(dy<0)player.dir='up';else if(dy>0)player.dir='down';
  const spd=player.spd*(CT/TILE);
  const nx=player.x+dx*spd,ny=player.y+dy*spd,hw=player.w/2,hh=player.h/2;
  if(!solid(nx-hw,player.y+hh)&&!solid(nx+hw,player.y+hh)&&!solid(nx-hw,player.y-hh)&&!solid(nx+hw,player.y-hh))player.x=nx;
  if(!solid(player.x-hw,ny+hh)&&!solid(player.x+hw,ny+hh)&&!solid(player.x-hw,ny-hh)&&!solid(player.x+hw,ny-hh))player.y=ny;
  if(dx||dy){
    player.step+=0.2;
    move._fs=(move._fs||0)+Math.abs(dx*spd)+Math.abs(dy*spd);
    if(move._fs>34){move._fs=0;sfx.foot();}
    tutMove(Math.abs(dx*spd)+Math.abs(dy*spd));
    markExplored();checkDiscover();
  }
}

function draw(t){
  const mw=MW*CT,mh=MH*CT;

    if(V2&&isWallTile(x,y)){

      const nb={up:isWallTile(x,y-1),down:isWallTile(x,y+1),left:isWallTile(x-1,y),right:isWallTile(x+1,y)};

      });
      /* CO-1 知识直答门 */

        decor(k.tx,k.ty,'terminal',!!state.flags['kdoor_'+k.mod]);

          if(state.flags['kdoor_'+k.mod])return;
          const gx=k.tx*CT-cam.x,gy=k.ty*CT-cam.y-24;

        });
        near(k.tx,k.ty,'kdoor',k);
      });
      /* 维护者信箱 + 提交者之墙 */
      MAILBOXES.forEach(b=>{
        decor(b.tx,b.ty,b.kind==='mailbox'?'vending':'wall',false);
        near(b.tx,b.ty,b.kind,b);
      });
      /* 接力门 (锁tile 由地图画, 这里只挂交互和横幅) */
      RELAY_DOORS.forEach(d=>{

        });
      });
    }else{
      STELES_A2.forEach(s=>{
        decor(s.tx,s.ty,'stele',state.steles.includes(s.id));
        near(s.tx,s.ty,'stele',s);
      });
    }
    /* 缓存箱: 开箱演出(渐隐+上浮)后从世界移除; 地图留暗点(地图记得, 世界干净) */
    curCaches().forEach(c=>{
      const key='cache_'+state.world+'_'+c.id;
      const opened=!!state.flags[key],a0=cacheAnim[key];
      const sx=c.tx*CT-cam.x,sy=c.ty*CT-cam.y;
      if(opened&&(!a0||t-a0>700))return;      // 已开且演出完 → 世界中彻底消失
      if(opened){
        const p=Math.min(1,(t-a0)/700);
        push('decor',sy+12,()=>{
          ctx.save();ctx.globalAlpha=1-p;
          drawCacheFx(sx,sy-p*12,t,false);
          ctx.strokeStyle='rgba(255,220,120,'+(0.8*(1-p))+')';ctx.lineWidth=2;
          ctx.beginPath();ctx.arc(sx,sy-4,4+p*16,0,7);ctx.stroke();
          ctx.restore();
        });
      }else{
        push('decor',sy+12,()=>drawCacheFx(sx,sy,t,false));
        near(c.tx,c.ty,'cache',c);
      }
    });
    /* 留言牌 (social.js 黑魂式) */
    if(window.SOCIAL&&SOCIAL.notesSync){
      let notes=[];try{notes=SOCIAL.notesSync(state.world)||[];}catch(e){}
      notes.forEach(nn=>{
        const sx=nn.tx*CT-cam.x,sy=nn.ty*CT-cam.y;
        if(sx<-CT||sy<-CT||sx>VW+CT||sy>VH+CT)return;
        push('decor',sy+12,()=>drawNoteDecor(sx,sy+10,t));
        near(nn.tx,nn.ty,'note',nn,CT*1.2);
      });
    }
    const po=PORTALS[state.world];
    push('decor',po.ty*CT-cam.y+4,()=>drawPortalFx(po.tx*CT-cam.x,po.ty*CT-cam.y,t,state.a2Unlocked));
    near(po.tx,po.ty,'portal',po,CT*1.8);
    curNpcs().forEach(n=>{
      const cx=n.tx*CT-cam.x,cy=n.ty*CT-cam.y;
      if(ART)npcSprite(cx,cy,NPC_ART[n.id]||'daemon');
      else push('npc',cy+11,()=>drawNPCOld(n,cx,cy,t));
      const hasNew=npcHasNew(n,false);
      if(Math.hypot(n.tx*CT-player.x,n.ty*CT-player.y)<CT*4){
        overlays.push(()=>{
          if(ART&&ART.fx.nameplate)ART.fx.nameplate(ctx,cx,cy-24,TT(n.name),hasNew);
          else{ctx.fillStyle="rgba(255,206,58,.9)";ctx.font="13px 'Cascadia Code','Consolas','Microsoft YaHei','PingFang SC','Noto Sans SC',monospace";ctx.textAlign="center";
          ctx.fillText(TT(n.name),cx,cy-24);ctx.textAlign="left";}
        });
      }
      if(hasNew)overlays.push(()=>drawTalkBubble(cx,cy-41,t));
      near(n.tx,n.ty,'npc',n);
    });
    // 神殿信标点亮演出
    if(state.world==='as'&&state.flags.cpuLit&&!state.asm){
      overlays.push(()=>{
        const bx=REALMS_AS[0].tx*CT-cam.x,by=REALMS_AS[0].ty*CT-cam.y;
        const rr=(t/150)%22;
        ctx.strokeStyle='rgba(255,212,94,'+Math.max(0,0.55-rr*0.025)+')';ctx.lineWidth=2;
        ctx.beginPath();ctx.arc(bx,by-34,Math.max(1,rr*2),0,7);ctx.stroke();
      });
    }
    /* 领域点亮爆发 (区域全清演出) */
    if(litFx){
      const el2=t-litFx.t0;
      if(el2>2600)litFx=null;
      else overlays.push(()=>{
        const bx=litFx.tx*CT-cam.x,by=litFx.ty*CT-cam.y;
        const p=el2/2600;
        ctx.save();
        ctx.strokeStyle='rgba(140,255,170,'+(0.85*(1-p))+')';ctx.lineWidth=3;
        ctx.beginPath();ctx.arc(bx,by-14,6+p*90,0,7);ctx.stroke();
        ctx.fillStyle='rgba(190,255,210,'+(0.35*(1-p))+')';
        ctx.fillRect(bx-8,by-90,16,80);       // 光柱
        for(let i=0;i<8;i++){
          const a=i*0.785+el2/300;
          ctx.fillStyle='rgba(255,240,160,'+(0.7*(1-p))+')';
          ctx.fillRect(bx+Math.cos(a)*(14+p*46),by-14+Math.sin(a)*(10+p*30),3,3);
        }
        ctx.restore();
      });
    }
  }
  /* 玩家入列 */
  {
    const pcx=player.x-cam.x,pcy=player.y-cam.y;
    if(V2)push('player',pcy+11,()=>V2.drawPlayer(ctx,pcx,pcy+11,32,player.dir||'down',Math.floor(player.step*2)%2,t,WORLD));
    else if(ART)push('player',pcy+11,()=>ART.drawPlayer(ctx,pcx,pcy+11,32,player.dir||'down',Math.floor(player.step*2)%2,t,WORLD));
    else push('player',pcy+11,()=>drawPlayerOld(pcx,pcy));
  }
  /* 第 2 遍: 排序即遮挡 */
  if(V2)E.sort((a,b)=>a.s-b.s);
  E.forEach(e=>{try{e.d();}catch(err){}});
  /* 靠近可交互物: 柔光描边 + E 提示强化 */
  if(nearThing&&mode==='play'&&!sceneActive){
    const g=0.25+0.15*Math.sin(t/260);
    ctx.strokeStyle='rgba(220,255,230,'+g+')';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(nearThing.sx,nearThing.sy,CT*0.72,0,7);ctx.stroke();
    ctx.strokeStyle='rgba(160,240,190,'+(g*0.5)+')';
    ctx.beginPath();ctx.arc(nearThing.sx,nearThing.sy,CT*0.72+4,0,7);ctx.stroke();
  }
  /* Q ping 扫描波 */
  if(pingFx){
    const el3=t-pingFx.t0,r=el3*0.42;
    if(el3>1800)pingFx=null;
    else{
      const pcx=pingFx.x-cam.x,pcy=pingFx.y-cam.y;
      if(ART&&ART.fx.pingWave)ART.fx.pingWave(ctx,pcx,pcy,r,t,WORLD);
      else{ctx.strokeStyle='rgba(63,212,196,'+Math.max(0,0.6-el3/1800*0.6)+')';ctx.lineWidth=2;
        ctx.beginPath();ctx.arc(pcx,pcy,r,0,7);ctx.stroke();}
      pois.forEach(p=>{
        const d=Math.hypot(p.x-pingFx.x,p.y-pingFx.y);
        if(Math.abs(d-r)<34){
          ctx.strokeStyle='rgba(255,230,140,.9)';ctx.lineWidth=2;
          ctx.strokeRect(p.x-cam.x-12,p.y-cam.y-12,24,24);
        }
      });
    }
  }
  overlays.forEach(f=>{try{f();}catch(err){}});
  // 全屏特效
  if(ART){ART.fx.scanlineCanvas(ctx,VW,VH);ART.fx.vignette(ctx,VW,VH);}
  else{ctx.fillStyle="rgba(0,0,0,.1)";for(let y=0;y<VH;y+=3)ctx.fillRect(0,y,VW,1);}
  if(ART&&t<glitchUntil)ART.fx.glitch(ctx,VW,VH,glitchPow);
  // 提示
  const pr=$('prompt');
  if(nearThing&&mode==='play'&&!sceneActive){
    const lab={npc:L('[E] Talk','[E] 对话'),mnpc:L('[E] Talk','[E] 对话'),stele:L('[E] Read','[E] 察看'),
      mstele:L('[E] Read','[E] 察看'),console:L('[E] Operate','[E] 操作'),hidden:L('[E] Inspect','[E] 调查'),
      cache:L('[E] Open','[E] 开箱'),portal:L('[E] Warp','[E] 传送'),realm:L('[E] Enter','[E] 进入'),
      tower:L('[E] Inspect','[E] 察看'),door:L('[E] Leave','[E] 离开'),exitTerm:L('[E] Re-register','[E] 重新注册'),
      puzzle:L('[E] Examine','[E] 检视'),note:L('[E] Read note','[E] 读留言'),relay:L('[E] Sign / open','[E] 签名/开门'),
      kdoor:L('[E] Answer the door','[E] 直答开门'),mailbox:L('[E] Mailbox','[E] 信箱'),commitwall:L('[E] Read the wall','[E] 看墙')}[nearThing.type];
    pr.style.display='block';pr.textContent=TT(lab);
  }else pr.style.display='none';
  $('coord').textContent='['+((player.x/CT)|0)+', '+((player.y/CT)|0)+'] '+(state.interior?TT(IMODS[state.interior].title||L('interior','室内')):(state.world==='a2'?'A2':'AS'));
  /* HUD 只属于走地图状态: 谜题/对话/任何面板打开或演出中一律隐藏 */
  const hudVis=(mode==='play')&&!sceneActive&&!state.hudHidden&&running;
  if(draw._hudVis!==hudVis){draw._hudVis=hudVis;$('hud').style.display=hudVis?'block':'none';}
}

function drawPlayerOld(cx,cy){
