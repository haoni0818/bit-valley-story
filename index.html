function drawNPCOld(n,cx,cy,t){
  const bob=Math.sin(t/400+(n.tx||n.x||0))*2|0;
  ctx.fillStyle="rgba(0,0,0,.35)";ctx.fillRect(cx-7,cy+8,14,3);
  ctx.fillStyle=n.body||n.color||'#cfeecf';ctx.fillRect(cx-5,cy-10+bob,10,9);
  ctx.fillStyle="#0a0f0a";ctx.fillRect(cx-3,cy-7+bob,6,3);
  ctx.fillStyle=n.suit||'#3a5a7a';ctx.fillRect(cx-6,cy-1+bob,12,8);
  ctx.fillStyle="#223";ctx.fillRect(cx-5,cy+7,3,4);ctx.fillRect(cx+2,cy+7,3,4);
}
function currentObjective(){
  if(state.interior&&MODS[state.interior]){
    const m=MODS[state.interior];
    for(const q of (m.quests||[])){
      if((q.line||'side')!=='main')continue;
      const st=state.mq[q.id]||{steps:{}};
      if(st.done)continue;
      for(const sp of (q.steps||[]))if(!st.steps[sp.id])return TT(sp.text);
    }
  }
  const mq=state.quests.filter(q=>q.type==='main'&&!q.done)[0];
  if(mq)return TT(mq.text);
  if(state.flags.kn_ending)return TT(L('The machine remembers you.','机器记得你。'));
  return TT(L('Explore. Stay referenced.','去探索。保持被引用。'));
}
/* HUD 瘦身: 章节徽章 + REF + 当前目标一行 + (可选)下一章推荐 + 班级目标条。
   线索列表在 J 日志; 物品在 I 背包 —— HUD 不重复。
   低频兜底: 2s 定时重算(中央通道 questChanged 之外的漏网状态变化) */
function drawHUD(){
  let ch;
  if(state.flags.kn_ending)ch=L('EPILOGUE — the machine remembers you','终章 —— 机器记得你');
  else if(state.ascended)ch=L('Act III · The Deep Layer','第三幕 · 深层世界');
  else if(state.asm)ch=L('Act II · Restore','第二幕 · 修复六域');
  else if(state.tut>=4)ch=L('Act I · The Valley','第一幕 · 峡谷');
  else ch=L('Prologue · Awakening','序章 · 苏醒');
  const ref=state.ref==null?100:state.ref;
  const cls=ref>60?'':(ref>30?'warn':'low');
  const obj=currentObjective();
  const flash=(drawHUD._lastObj!==undefined&&drawHUD._lastObj!==obj);
  drawHUD._lastObj=obj;
  let h='<b>'+TT(L('Bit Valley Story','比特谷物语'))+'</b> <span class="dim">['+(state.world==='a2'?'A2':'AS')+']</span> <span class="dim">'+TT(ch)+'</span><br>'+
    (state.flags.refIntro?('<span id="refLab" title="'+TT(L('REF = reference count, your lifeline. Click for a recap.','REF = 引用计数, 你的生命线。点击看速览。'))+'" style="cursor:help">REF</span> <span id="refBar"><span id="refFill" class="'+cls+'" style="display:block;width:'+ref+'%"></span></span> <b>'+ref+'</b><br>'):'')+
    '<span id="hudObj"'+(flash?' class="flash"':'')+' style="color:#ffce3a;font-size:12px;cursor:pointer" title="J">▶ '+obj.replace(/<[^>]*>/g,'').slice(0,56)+'</span>';
  /* 下一章推荐 (章节顺序引导, m4 期间显示) */
  if(state.asm&&!state.ascended&&state.world==='as'&&!state.interior){
    const nc=nextChapter();
    if(nc){
      const r=chapterRealm(nc.mod);
      if(r)h+='<br><span class="dim" style="font-size:12px">▷ '+TT(L('next: ','下一章: '))+TT(r.name).replace(/<[^>]*>/g,'')+'</span>';
    }
  }
  /* 班级共同目标 (social.js, 老师没设目标时不显示) */
  let gs=null;try{if(window.SOCIAL&&SOCIAL.goalStatusSync)gs=SOCIAL.goalStatusSync();}catch(e){}
  if(gs&&gs.active){
    const pct=Math.max(0,Math.min(100,gs.pct|0));
    h+='<div id="goalStrip">◎ '+esc(TT(gs.title||''))+' <span class="gbar"><span class="gfill" style="width:'+pct+'%"></span></span>'+(gs.progress|0)+'/'+(gs.target|0)+'</div>';
  }
  h+='<br><button id="hudLang" class="btn" style="font-size:11px;padding:1px 8px">'+(window.LANG==='en'?'切换中文':'Switch to EN')+'</button>';
  if(h===drawHUD._h)return;   // 廉价 diff: 没变不动 DOM
  drawHUD._h=h;
  $('hud').innerHTML=h;
  const lb=$('hudLang');if(lb)lb.onclick=toggleLang;
  const ho=$('hudObj');if(ho)ho.onclick=()=>{if(mode==='play')toggleJournal();};
  const rl=$('refLab'),rb=$('refBar');
  const refRecap=()=>{showModal(L('REF · REFERENCE COUNT','REF · 引用计数'),
    L('How much of this world still refers to you — your lifeline here.<br>· Drains slowly with time (the machine is forgetting you)<br>· Refills when you matter: quests, puzzles, steles, caches<br>· At 0 the Recycler collects you (you lose time, never progress)<br><span class="dim">Full notes: Manual §5 (M)</span>',
      '这个世界还有多少东西在引用你 —— 你在这里的生命线。<br>· 随时间缓慢流失(机器在慢慢忘记你)<br>· 被需要就回填: 任务、谜题、石碑、缓存箱<br>· 归零会被回收者收走(只损失时间, 永不损失进度)<br><span class="dim">详细说明: 手册 §5 (按 M)</span>'));};
  if(rl)rl.onclick=refRecap;
  if(rb)rb.onclick=refRecap;
}

/* ---------------- 排行榜接线 (模式 B) ---------------- */
function lbStats(){
  let main=0,mainTotal=5,side=0,hidden=0;
  state.quests.forEach(q=>{
    if(q.type==='main'&&q.done)main++;
    else if(q.type==='side'&&q.done)side++;
    else if(q.type==='hidden'&&q.done)hidden++;
  });
  MODLIST.forEach(m=>(m.quests||[]).forEach(q=>{
    const st=state.mq[q.id],line=q.line||'side';
    if(line==='main'){mainTotal++;if(st&&st.done)main++;}
    else if(st&&st.done){if(line==='hidden')hidden++;else side++;}
  }));
  const endings=['exit0','exit1','return','fork'].filter(e=>state.flags['kn_end_'+e]);
  return {main,mainTotal,dex:state.dex.length,dexTotal:DEX_ALL.length,side,hidden,
          endings,playMs:state.playMs|0,world:state.world};
}

  }catch(e){}
}

/* ---------------- 20. 主循环 · 启动 ---------------- */
let running=false,lastT=0;
function loop(t){
  if(running&&mode==='play')move();
  if(running&&mode!=='intro'){const dt=Math.min(100,t-(lastT||t));state.playMs+=dt;}
  lastT=t;
  draw(t);
  requestAnimationFrame(loop);
}
function beginPlay(){
  $('intro').style.display='none';running=true;setMode('play');
  drawHUD();renderJournal();refreshLangUI();
  setTimeout(soCelebrate,2500);        // 班级目标达标庆祝(登录见一次)
  setTimeout(pollTeacherGate,1200);    // 教师章节闸门: 进游戏即查一次
}
function newGame(){
  wipeSave();
  state.tut=0;state.moved=0;state.gate=false;state.asm=false;
  state.collected=[];state.steles=[];state.clues=[];state.quests=[];state.flags={};
  state.items={};state.mq={};state.dex=[];state.ref=100;
  state.world='as';state.interior=null;state.retPos=null;
  state.ascended=false;state.a2Unlocked=false;state.playMs=0;
  state.recentEvents=[];state.hudHidden=false;state.chapSeen=0;state.letters=[];
  EXP.as.clear();EXP.a2.clear();
  MODLIST.forEach(m=>(m.quests||[]).forEach(q=>{state.mq[q.id]={steps:{},done:false};}));
  genAS();genA2();setContext();
  player.x=SPAWN.x*TILE;player.y=SPAWN.y*TILE;
  markExplored();
  beginPlay();
  tutStart();
}
function contGame(){beginPlay();toast(L('Save loaded · press J for quests','存档已载入 · 按 J 查看任务'));}
function renderIntro(){
  $('introTitle').textContent=TT(L('Bit Valley Story','比特谷物语'));
  $('introText').innerHTML=TT(L(
    'A lab. Late night. One Enter key that should never have been pressed.<br><br>'+
    'When you open your eyes, the sky is scrolling hexadecimal and the ground is paved with <span class="k">0</span>s and <span class="k">1</span>s.<br>'+
    'This machine is <span class="k">corroding from below</span> — and you are trapped inside it.<br><br>'+
    '<span class="dim">Something deep in the data stream is calling your name. To get back to reality, first learn to survive in here.</span>',
    '实验室。深夜。一次不该按下的回车。<br><br>'+
    '你再睁眼时，天空是滚动的十六进制，脚下的土地由 <span class="k">0</span> 和 <span class="k">1</span> 铺成。<br>'+
    '这台机器正在<span class="k">自下而上地腐蚀</span>——而你被困在它的内部。<br><br>'+
    '<span class="dim">数据流深处有个声音在喊你。想回到现实，先学会在这个世界活下去。</span>'));
  const box=$('introBtns');box.innerHTML='';
  if(hasSave()){
    const b1=document.createElement('button');b1.textContent=TT(L('CONTINUE >_','继续旅程 >_'));b1.onclick=contGame;box.appendChild(b1);
    const b2=document.createElement('button');b2.textContent=TT(L('NEW RUN','新的开始'));b2.style.marginLeft='14px';
    b2.onclick=()=>{if(confirm(TT(L('Wipe the save and reconnect?','抹掉存档, 重新接入?'))))newGame();};box.appendChild(b2);
  }else{
    const b=document.createElement('button');b.textContent=TT(L('CONNECT >_','接入世界 >_'));b.onclick=newGame;box.appendChild(b);
  }
}
function setupIntro(){
  renderIntro();
  $('langEn').onclick=()=>setLang('en');
  $('langZh').onclick=()=>setLang('zh');
}

registerModules();
genAS();genA2();
setContext();
if(hasSave())load();
setupIntro();
setLang(window.LANG);   // 应用 lang-zh/lang-en 阅读排版 + 全 UI 文案
drawHUD();
lbInit();
invInit();
fbInit();
soInit();
pollTeacherGate();
setInterval(pollTeacherGate,60000);   // 教师章节闸门 60s 轮询
setInterval(()=>{if(running)save();},8000);
requestAnimationFrame(loop);

/* ---- 调试/测试出口 (node 行为测试 + 截图钩子用) ---- */
window.ENG={
  state,api,player,MODS,MODLIST,IMODS,
  get mode(){return mode;},get DEX_ALL(){return DEX_ALL;},
  newGame,contGame,beginPlay,setLang,toggleLang,refAdd,save,load,wipeSave,
  enterInterior,leaveInterior,switchWorld:portalUse,startAscend,checkAscend,asMainsDone,
  addQuest,doneQuest,questDone,modCompleteStep,modQuestComplete,collectDex,
  openManual,closeManual,openBin,closeBin,openAsm,closeAsm,openPuzzle,closeModPanel,
  openMap,closeMap,toggleJournal,lbStats,litCount,runScene,gateSolved,asmWin,
  steleRead,hiddenUse,enterRecycler,recyclerExit,setContext,interactNow:interact,
  get nearThing(){return nearThing;},get sceneActive(){return sceneActive;},
  addClue,removeClue,STELES_AS,HIDDENS_AS,CACHES_AS,REALMS_AS,REALMS_A2,PORTALS,
  cacheUse,consoleUse,realmUse,portalUse,unlockOk,modMainDone,
  get curPuzzle(){return curPuzzle;},get CT(){return CT;},get WORLD(){return WORLD;},
  EXP,genAS,genA2,
  /* v5 整合新增出口 */
  CHAPTERS,KDOORS,RELAY_DOORS,MAILBOXES,PREVIEW_MODS,
  chapterOf,chapterDone,nextChapter,chapterRealm,pruneClues,CLUE_DONE,
  get teacherChapter(){return teacherChapter;},set teacherChapter(v){teacherChapter=v;},
  pollTeacherGate,newChapterScene,runLightScene,
  openCodex,renderCodexPage,get CODEX_ALL(){return CODEX_ALL;},get CODEX_PAGE(){return CODEX_PAGE;},get DEX_PAGE(){return DEX_PAGE;},
  openPause,closePause,toggleHud,startPing,questChanged,drawHUD,renderJournal,renderMap,
  kdoorUse,relayUse,mailboxUse,commitWallUse,showLetters,addLetter,refIntroShow,
  get TOASTQ(){return TOASTQ;},get toastBusy(){return toastBusy;},toastDur,
  get manIdx(){return manIdx;},get journalOpen(){return journalOpen;},

  set pendingLight(v){pendingLight=v;},

};

/* ---- 截图调试钩子: index.html#shot=... ---- */
(function(){
  const m=(location.hash||'').match(/shot=(\w+)/);if(!m)return;
  const s=m[1];
  try{
    if(s==='title'){return;}                       // 停在标题画面
    newGame();
    if(s!=='tut'){if(dlg)endDialog();sceneActive=false;}
    if(s==='journal'){state.tut=3;journalOpen=true;renderJournal();}
    else if(s==='manual')openManual(0);
    else if(s==='dex'){collectDex(DEX_BUILTIN[0].syl);openManual(DEX_PAGE);}
    else if(s==='bin')openBin();
    else if(s==='asm'){state.tut=4;openAsm();}
    else if(s==='as'){
      state.tut=4;state.gate=true;state.asm=true;openGateTiles();openDoor2Tiles();
      state.flags.revealDone=true;state.flags.mapUnlock=true;state.flags.refIntro=true;
      player.x=54*TILE;player.y=11.5*TILE;markExplored();drawHUD();
    }
    else if(s==='interior'||s==='puzzle'){
      state.tut=4;
      state.quests.push({id:'m3',text:'m3',type:'main',done:true});
      const id=MODS.logic?'logic':(MODLIST[0]&&MODLIST[0].id);
      if(id){enterInterior(id);
        if(s==='puzzle'&&MODS[id].puzzles&&MODS[id].puzzles[0])openPuzzle(MODS[id].puzzles[0]);}
    }
    else if(s==='a2'){
      state.tut=4;state.ascended=true;state.a2Unlocked=true;
      state.world='a2';state.interior=null;setContext();
      player.x=(PORTALS.a2.tx+0.5)*TILE;player.y=(PORTALS.a2.ty+2)*TILE;
      markExplored();drawHUD();
    }
    else if(s==='recycler'){enterRecycler();}
    else if(s==='mapfull'){   // 揭幕后 AS 全图 (9 POI 验收)
      state.tut=4;state.gate=true;state.asm=true;openGateTiles();openDoor2Tiles();
      state.flags.revealDone=true;state.flags.mapUnlock=true;state.flags.refIntro=true;
      for(let cy2=0;cy2<12;cy2++)for(let cx2=0;cx2<16;cx2++)EXP.as.add(cx2+','+cy2);
      openMap();
    }
    else if(s==='primer'){    // primer 概念卡 (内存迷宫栈谜题首开)
      state.tut=4;state.quests.push({id:'m3',text:'m3',type:'main',done:true});
      if(MODS.memory){enterInterior('memory');openPuzzle(MODS.memory.puzzles[0]);}
    }
    else if(s==='codex'){     // 📖 知识库侧挂在谜题面板旁
      state.tut=4;state.quests.push({id:'m3',text:'m3',type:'main',done:true});
      if(MODS.memory){enterInterior('memory');
        const p=MODS.memory.puzzles[0];
        state.flags['primer_seen_'+p.id]=true;
        openPuzzle(p);openCodex(p.codex||['stack']);}
    }
    else if(s==='recent'){    // 日志「最近事件」两页签
      state.tut=4;
      toast(L('◈ Sample event: stack shrine cleared ◈','◈ 示例事件: 栈神庙已通过 ◈'),true);
      toast(L('◈ Item: XOR Key','◈ 获得物品: 异或密钥'),true);
      journalOpen=true;renderJournal._recOpen=true;renderJournal();
    }
    else if(s==='pause')openPause();
    else if(s==='lit'){       // 区域点亮演出
      state.tut=4;state.gate=true;state.asm=true;openGateTiles();openDoor2Tiles();
      state.flags.revealDone=true;state.flags.mapUnlock=true;
      player.x=14*TILE;player.y=26*TILE;markExplored();
      runLightScene('data');
    }
  }catch(e){window.onerror(String(e),'',0);}
})();
